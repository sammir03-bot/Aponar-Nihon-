<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N5 漢字クイズ - パート7 (問題121-135) ふりがな付き</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hind Siliguri', 'Noto Sans Bengali', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            background: linear-gradient(145deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #0c4a6e;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 40px 40px 20px 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-bottom: 6px solid #0284c7;
            text-align: center;
        }

        h1 {
            font-size: 2.4em;
            font-weight: 700;
            color: #0369a1;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 span {
            background: #0284c7;
            color: white;
            font-size: 0.45em;
            padding: 6px 20px;
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .subhead {
            font-size: 1.2em;
            color: #0369a1;
            background: #f0f9ff;
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-block;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed #7dd3fc;
            font-weight: 600;
            color: #0369a1;
        }

        .badge {
            background: #0369a1;
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 1em;
        }

        .quiz-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-card {
            background: white;
            border-radius: 30px;
            padding: 25px 30px;
            box-shadow: 0 10px 25px rgba(2, 132, 199, 0.1);
            transition: transform 0.2s;
            border: 2px solid #bae6fd;
        }

        .question-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px rgba(2, 132, 199, 0.2);
            border-color: #38bdf8;
        }

        .q-num {
            display: inline-block;
            background: #0284c7;
            color: white;
            font-weight: 600;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 1rem;
            margin-bottom: 18px;
            letter-spacing: 0.5px;
        }

        .sentence {
            font-size: 1.8em;
            margin-bottom: 20px;
            line-height: 2.2;
            background: #f0f9ff;
            padding: 20px 25px;
            border-radius: 25px;
            border: 2px solid #bae6fd;
            font-weight: 600;
            color: #075985;
            text-align: center;
            word-break: break-word;
        }

        .highlight-kanji {
            display: inline-block;
            background: #fee2e2;
            color: #b91c1c;
            font-weight: 700;
            padding: 4px 15px;
            border-radius: 40px;
            border: 2px solid #fecaca;
            margin: 0 5px;
            font-size: 1.2em;
        }

        .question-text {
            font-size: 1.3em;
            margin-bottom: 15px;
            font-weight: 500;
            color: #075985;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 20px 0 15px;
        }

        .option-btn {
            background: white;
            border: 3px solid #bae6fd;
            padding: 18px 12px;
            border-radius: 60px;
            font-size: 1.3em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            color: #075985;
            box-shadow: 0 5px 10px rgba(0,0,0,0.02);
        }

        .option-btn:hover:not(.disabled-opt) {
            background: #e0f2fe;
            border-color: #0284c7;
            transform: scale(1.01);
            box-shadow: 0 10px 15px rgba(2,132,199,0.15);
        }

        .correct-opt {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            box-shadow: 0 5px 15px rgba(34,197,94,0.25);
        }

        .wrong-opt {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #7f1d1d !important;
            opacity: 0.9;
        }

        .disabled-opt {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        .feedback {
            margin-top: 20px;
            padding: 18px 22px;
            border-radius: 25px;
            background: #f8fafc;
            border-left: 8px solid #64748b;
            font-size: 1.1em;
            line-height: 1.7;
            border: 1px solid #cbd5e1;
        }

        .feedback.correct-fb {
            background: #f0fdf4;
            border-left-color: #22c55e;
        }

        .feedback.wrong-fb {
            background: #fef2f2;
            border-left-color: #ef4444;
        }

        .fb-title {
            font-weight: 700;
            margin-right: 10px;
            font-size: 1.1em;
        }

        .rule {
            background: #fffbeb;
            padding: 10px 15px;
            border-radius: 20px;
            margin-top: 10px;
            border-left: 5px solid #f59e0b;
            font-size: 0.95em;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 40px 0 30px;
            justify-content: center;
        }

        .primary-btn, .secondary-btn {
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 2px solid transparent;
        }

        .primary-btn {
            background: #0284c7;
            color: white;
        }

        .primary-btn:hover {
            background: #0369a1;
            transform: translateY(-4px);
            box-shadow: 0 20px 30px rgba(2,132,199,0.35);
        }

        .secondary-btn {
            background: #1e293b;
            color: white;
        }

        .secondary-btn:hover {
            background: #0f172a;
            transform: translateY(-4px);
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            color: #0369a1;
            font-size: 1rem;
            background: white;
            padding: 20px;
            border-radius: 70px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 2px solid #bae6fd;
        }

        hr {
            border: none;
            height: 3px;
            background: linear-gradient(to right, transparent, #0284c7, transparent);
            margin: 30px 0;
        }

        @media (max-width: 700px) {
            h1 { font-size: 2em; }
            .sentence { font-size: 1.5em; }
            .options { grid-template-columns: 1fr; }
            .option-btn { padding: 15px; }
        }

        /* furigana styling */
        ruby {
            ruby-align: center;
        }
        rt {
            font-size: 0.6em;
            color: #0284c7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                📘 JLPT N5 漢字クイズ
                <span>Part 7 (121-135)</span>
            </h1>
            <div class="subhead">
                かんじの よみかたを えらんでください。（ふりがな付き）
            </div>
            <div class="stats">
                <span>🈳 全15問</span>
                <span class="badge">レベル N5 · 漢字</span>
            </div>
        </div>

        <div class="quiz-grid" id="quizGrid">
            <!-- JavaScriptで生成 -->
        </div>

        <div class="action-buttons">
            <button class="primary-btn" onclick="revealAllAnswers()">✅ 全ての答えを見る</button>
            <button class="secondary-btn" onclick="resetAll()">🔄 リセット</button>
        </div>

        <hr>
        <div class="footer">
            ⚡ 日本語能力試験 N5 対策 | 解説はベンガル語（とても簡単な説明）
        </div>
    </div>

    <script>
        // 質問データ (問題121-135) with furigana - JLPT N5 official style
        const questions = [
            // Type 1: Kanji reading questions (もんだい１ style) - 121から135まで
            { 
                num: 121, 
                type: 'reading',
                sentence: '<span class="highlight-kanji">【空】</span>は あおくて きれい です。',
                question: '【空】の 読(よ)み方(かた)は どれですか।',
                options: ['そら', 'から', 'うえ', 'あお'], 
                correct: 'a' 
            },
            { 
                num: 122, 
                type: 'reading',
                sentence: 'ここ から <span class="highlight-kanji">【空港】</span>まで バスで <ruby>行<rt>い</rt></ruby>きます。',
                question: '【空港】の 読み方は？',
                options: ['そらみなと', 'くうみなと', 'くうこう', 'そらこう'], 
                correct: 'c' 
            },
            { 
                num: 123, 
                type: 'reading',
                sentence: '<span class="highlight-kanji">【西口】</span>は あの <ruby>信号<rt>しんごう</rt></ruby>の <ruby>左<rt>ひだり</rt></ruby>に あります।',
                question: '【西口】の 読み方は？',
                options: ['にしぐち', 'ひがしぐち', 'きたぐち', 'みなみぐち'], 
                correct: 'a' 
            },
            { 
                num: 124, 
                type: 'reading',
                sentence: 'この <span class="highlight-kanji">【店長】</span>は とても やさしい です।',
                question: '【店長】の 読み方は？',
                options: ['みせなが', 'みせちょう', 'てんちょう', 'てんなが'], 
                correct: 'c' 
            },
            { 
                num: 125, 
                type: 'reading',
                sentence: '<span class="highlight-kanji">【朝食】</span>は ７<ruby>時<rt>じ</rt></ruby>からです।',
                question: '【朝食】の 読み方は？',
                options: ['あさたべ', 'ちょうたべ', 'ちょうしょく', 'あさしょく'], 
                correct: 'c' 
            },
            { 
                num: 126, 
                type: 'reading',
                sentence: 'この <span class="highlight-kanji">【料理店】</span>は やさい <ruby>料理<rt>りょうり</rt></ruby>が おいしい です।',
                question: '【料理店】の 読み方は？',
                options: ['りょうりてん', 'りょうりみせ', 'りょうりしょく', 'りょうりや'], 
                correct: 'a' 
            },
            { 
                num: 127, 
                type: 'reading',
                sentence: 'この <span class="highlight-kanji">【教会】</span>は <ruby>古<rt>ふる</rt></ruby>い です।',
                question: '【教会】の 読み方は？',
                options: ['きょうかい', 'きょうえ', 'きょうか', 'きょうえい'], 
                correct: 'a' 
            },
            { 
                num: 128, 
                type: 'reading',
                sentence: '<span class="highlight-kanji">【映画】</span>は とても ながかった です।',
                question: '【映画】の 読み方は？',
                options: ['えいが', 'えいか', 'えが', 'えか'], 
                correct: 'a' 
            },
            { 
                num: 129, 
                type: 'reading',
                sentence: '<span class="highlight-kanji">【教科書】</span>を <ruby>家<rt>いえ</rt></ruby>に わすれました।',
                question: '【教科書】の 読み方は？',
                options: ['きょうかしょ', 'きょうかしょく', 'きょうかがき', 'きょうしゃしょ'], 
                correct: 'a' 
            },
            { 
                num: 130, 
                type: 'reading',
                sentence: 'この <span class="highlight-kanji">【問題】</span>は かんたん です।',
                question: '【問題】の 読み方は？',
                options: ['もんたい', 'ぶんだい', 'もんだい', 'ぶんたい'], 
                correct: 'c' 
            },
            { 
                num: 131, 
                type: 'reading',
                sentence: '<span class="highlight-kanji">【教室】</span>に つくえ が ２０<ruby>台<rt>だい</rt></ruby> あります।',
                question: '【教室】の 読み方は？',
                options: ['きょうへや', 'きょうしつ', 'きょうくみ', 'きょうかい'], 
                correct: 'b' 
            },
            { 
                num: 132, 
                type: 'reading',
                sentence: '<span class="highlight-kanji">【図書館】</span>で <ruby>本<rt>ほん</rt></ruby>を かりました।',
                question: '【図書館】の 読み方は？',
                options: ['ずしょかん', 'としょかん', 'どしょかん', 'としょうかん'], 
                correct: 'b' 
            },
            { 
                num: 133, 
                type: 'reading',
                sentence: 'となり の <span class="highlight-kanji">【部屋】</span>は <ruby>兄<rt>あに</rt></ruby>の へや です।',
                question: '【部屋】の 読み方は？',
                options: ['ぶや', 'べや', 'へや', 'へやあ'], 
                correct: 'c' 
            },
            { 
                num: 134, 
                type: 'reading',
                sentence: 'この <span class="highlight-kanji">【荷物】</span>を <ruby>持<rt>も</rt></ruby>って ください।',
                question: '【荷物】の 読み方は？',
                options: ['にぶつ', 'にもの', 'にもつ', 'かにもつ'], 
                correct: 'c' 
            },
            { 
                num: 135, 
                type: 'reading',
                sentence: 'えき の <span class="highlight-kanji">【南口】</span>で <ruby>会<rt>あ</rt></ruby>いましょう।',
                question: '【南口】の 読み方は？',
                options: ['きたぐち', 'ひがしぐち', 'にしぐち', 'みなみぐち'], 
                correct: 'd' 
            }
        ];

        // 簡単な解説 (ベンガル語) - খুব সহজ ভাষায়
        const explanations = {
            121: '【空】 = そら (আকাশ)। 空気 (くうき) = বাতাস।',
            122: '【空港】 = くうこう (এয়ারপোর্ট)। 空 = くう, 港 = こう।',
            123: '【西口】 = にしぐち (পশ্চিম গেট)। 西 = পশ্চিম, 東 = পূর্ব।',
            124: '【店長】 = てんちょう (দোকানের ম্যানেজার)। 店 = みせ, 長 = ちょう।',
            125: '【朝食】 = ちょうしょく (সকালের খাবার)। JLPT N5 শব্দ।',
            126: '【料理店】 = りょうりてん (রেস্টুরেন্ট)। 店 = みせ/てん।',
            127: '【教会】 = きょうかい (গির্জা)। 教 = শিক্ষা, 会 = সমাবেশ।',
            128: '【映画】 = えいが (সিনেমা)।',
            129: '【教科書】 = きょうかしょ (পাঠ্যবই)।',
            130: '【問題】 = もんだい (প্রশ্ন/সমস্যা)।',
            131: '【教室】 = きょうしつ (ক্লাসরুম)।',
            132: '【図書館】 = としょかん (লাইব্রেরি)।',
            133: '【部屋】 = へや (ঘর/রুম)।',
            134: '【荷物】 = にもつ (লাগেজ/জিনিসপত্র)।',
            135: '【南口】 = みなみぐち (দক্ষিণ গেট)। 南 = みなみ।'
        };

        // HTML 生成
        function renderQuestions() {
            const grid = document.getElementById('quizGrid');
            grid.innerHTML = '';
            
            questions.forEach(q => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${q.num}`;
                
                let optionsHtml = '';
                const optLetters = ['a', 'b', 'c', 'd'];
                q.options.forEach((opt, idx) => {
                    optionsHtml += `<div class="option-btn" onclick="checkAnswer(this, ${q.num}, '${optLetters[idx]}')">${optLetters[idx].toUpperCase()}) ${opt}</div>`;
                });

                card.innerHTML = `
                    <div class="q-num">Q${q.num}</div>
                    <div class="sentence">${q.sentence}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options" id="opt-group-${q.num}">
                        ${optionsHtml}
                    </div>
                    <div class="feedback" id="fb-${q.num}"></div>
                `;
                grid.appendChild(card);
            });
        }

        // 答えをチェック
        function checkAnswer(element, qNum, selectedOpt) {
            const groupId = 'opt-group-' + qNum;
            const options = document.querySelectorAll(`#${groupId} .option-btn`);
            const feedbackDiv = document.getElementById('fb-' + qNum);

            if (options[0].classList.contains('disabled-opt')) return;

            const q = questions.find(q => q.num === qNum);
            const correctAns = q.correct;
            const isCorrect = (selectedOpt === correctAns);

            options.forEach(opt => opt.classList.add('disabled-opt'));

            options.forEach(opt => {
                if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                    opt.classList.add('correct-opt');
                }
            });

            if (!isCorrect) {
                element.classList.add('wrong-opt');
            }

            const exp = explanations[qNum];
            if (isCorrect) {
                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">⭕ せいかい！</span> 
                        <div class="rule">${exp}</div>
                    </div>
                `;
            } else {
                feedbackDiv.innerHTML = `
                    <div class="feedback wrong-fb">
                        <span class="fb-title">❌ まちがい。</span> 正しい答えは緑色です。<br>
                        <div class="rule">${exp}</div>
                    </div>
                `;
            }
        }

        // 全ての答えを表示
        function revealAllAnswers() {
            for (let qNum = 121; qNum <= 135; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);
                const q = questions.find(q => q.num === qNum);
                const correctAns = q.correct;
                const exp = explanations[qNum];

                options.forEach(opt => {
                    opt.classList.add('disabled-opt');
                    if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                        opt.classList.add('correct-opt');
                    }
                });

                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">✅ 答え：</span> 
                        <div class="rule">${exp}</div>
                    </div>
                `;
            }
        }

        // リセット
        function resetAll() {
            for (let qNum = 121; qNum <= 135; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);

                options.forEach(opt => {
                    opt.classList.remove('disabled-opt', 'correct-opt', 'wrong-opt');
                });

                feedbackDiv.innerHTML = '';
            }
        }

        window.onload = renderQuestions;
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
</body>
</html>
