<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N5 読解クイズ - パート1 (問題1-20) ふりがな付き</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hind Siliguri', 'Noto Sans Bengali', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            background: linear-gradient(145deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #0c4a6e;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 40px 40px 20px 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-bottom: 6px solid #0284c7;
            text-align: center;
        }

        h1 {
            font-size: 2.4em;
            font-weight: 700;
            color: #0369a1;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 span {
            background: #0284c7;
            color: white;
            font-size: 0.45em;
            padding: 6px 20px;
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .subhead {
            font-size: 1.2em;
            color: #0369a1;
            background: #f0f9ff;
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-block;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed #7dd3fc;
            font-weight: 600;
            color: #0369a1;
        }

        .badge {
            background: #0369a1;
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 1em;
        }

        .quiz-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .passage-card {
            background: white;
            border-radius: 30px;
            padding: 25px 30px;
            box-shadow: 0 10px 25px rgba(2, 132, 199, 0.1);
            border: 2px solid #bae6fd;
        }

        .passage-title {
            font-size: 1.5em;
            font-weight: 600;
            color: #0284c7;
            margin-bottom: 15px;
            border-bottom: 2px dashed #7dd3fc;
            padding-bottom: 8px;
        }

        .passage-text {
            font-size: 1.3em;
            line-height: 2.2;
            background: #f0f9ff;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid #bae6fd;
        }

        .question-card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 5px 15px rgba(2, 132, 199, 0.08);
            border: 2px solid #e0f2fe;
        }

        .q-num {
            display: inline-block;
            background: #0284c7;
            color: white;
            font-weight: 600;
            padding: 4px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .question-text {
            font-size: 1.3em;
            margin-bottom: 15px;
            line-height: 1.6;
            font-weight: 500;
            color: #075985;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0;
        }

        .option-btn {
            background: white;
            border: 2.5px solid #bae6fd;
            padding: 12px 10px;
            border-radius: 40px;
            font-size: 1.1em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            color: #075985;
        }

        .option-btn:hover:not(.disabled-opt) {
            background: #e0f2fe;
            border-color: #0284c7;
            transform: scale(1.01);
        }

        .correct-opt {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }

        .wrong-opt {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #7f1d1d !important;
            opacity: 0.9;
        }

        .disabled-opt {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        .feedback {
            margin-top: 15px;
            padding: 15px 20px;
            border-radius: 20px;
            background: #f8fafc;
            border-left: 6px solid #64748b;
            font-size: 1.05em;
            line-height: 1.6;
            border: 1px solid #cbd5e1;
        }

        .feedback.correct-fb {
            background: #f0fdf4;
            border-left-color: #22c55e;
        }

        .feedback.wrong-fb {
            background: #fef2f2;
            border-left-color: #ef4444;
        }

        .fb-title {
            font-weight: 700;
            margin-right: 8px;
            font-size: 1.05em;
        }

        .rule {
            background: #fffbeb;
            padding: 8px 15px;
            border-radius: 15px;
            margin-top: 8px;
            border-left: 4px solid #f59e0b;
            font-size: 0.95em;
        }

        .translation {
            background: #e0f2fe;
            padding: 8px 15px;
            border-radius: 15px;
            margin-top: 8px;
            font-style: italic;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 40px 0 30px;
            justify-content: center;
        }

        .primary-btn, .secondary-btn {
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .primary-btn {
            background: #0284c7;
            color: white;
        }

        .primary-btn:hover {
            background: #0369a1;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(2,132,199,0.3);
        }

        .secondary-btn {
            background: #1e293b;
            color: white;
        }

        .secondary-btn:hover {
            background: #0f172a;
            transform: translateY(-3px);
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            color: #0369a1;
            font-size: 1rem;
            background: white;
            padding: 20px;
            border-radius: 70px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 2px solid #bae6fd;
        }

        hr {
            border: none;
            height: 3px;
            background: linear-gradient(to right, transparent, #0284c7, transparent);
            margin: 30px 0;
        }

        @media (max-width: 700px) {
            h1 { font-size: 2em; }
            .passage-text { font-size: 1.1em; }
            .question-text { font-size: 1.2em; }
            .options { grid-template-columns: 1fr; }
        }

        /* furigana styling */
        ruby {
            ruby-align: center;
        }
        rt {
            font-size: 0.55em;
            color: #0284c7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                📖 JLPT N5 読解クイズ
                <span>Part 1 (問題1-20)</span>
            </h1>
            <div class="subhead">
                文章を読んで質問に答えてください。（ふりがな付き・簡単な解説）
            </div>
            <div class="stats">
                <span>🈳 5つの文章 / 20問</span>
                <span class="badge">レベル N5 · 読解</span>
            </div>
        </div>

        <div class="quiz-grid" id="quizGrid">
            <!-- JavaScriptで生成 -->
        </div>

        <div class="action-buttons">
            <button class="primary-btn" onclick="revealAllAnswers()">✅ 全ての答えを見る</button>
            <button class="secondary-btn" onclick="resetAll()">🔄 リセット</button>
        </div>

        <hr>
        <div class="footer">
            ⚡ 日本語能力試験 N5 対策 | 解説はベンガル語（とても簡単な説明）
        </div>
    </div>

    <script>
        // 文章データ (Passage 1-5) with furigana
        const passages = [
            {
                id: 1,
                title: 'パッセージ １：山田さんの毎日',
                text: '<ruby>山田<rt>やまだ</rt></ruby>さんは <ruby>東京<rt>とうきょう</rt></ruby>の <ruby>大学<rt>だいがく</rt></ruby>で <ruby>日本語<rt>にほんご</rt></ruby>を <ruby>勉強<rt>べんきょう</rt></ruby>して います。<br><ruby>毎朝<rt>まいあさ</rt></ruby> ６<ruby>時<rt>じ</rt></ruby>に <ruby>起<rt>お</rt></ruby>きて、 ７<ruby>時<rt>じ</rt></ruby>に <ruby>朝<rt>あさ</rt></ruby>ご<ruby>飯<rt>はん</rt></ruby>を <ruby>食<rt>た</rt></ruby>べます。<br>８<ruby>時<rt>じ</rt></ruby>に <ruby>家<rt>いえ</rt></ruby>を <ruby>出<rt>で</rt></ruby>て、 バスで <ruby>大学<rt>だいがく</rt></ruby>へ <ruby>行<rt>い</rt></ruby>きます。',
                questions: [
                    { num: 1, text: '<ruby>山田<rt>やまだ</rt></ruby>さんは どこで <ruby>勉強<rt>べんきょう</rt></ruby>して いますか。', options: ['<ruby>高校<rt>こうこう</rt></ruby>', '<ruby>会社<rt>かいしゃ</rt></ruby>', '<ruby>大学<rt>だいがく</rt></ruby>', '<ruby>日本語学校<rt>にほんごがっこう</rt></ruby>'], correct: 'c' },
                    { num: 2, text: '<ruby>山田<rt>やまだ</rt></ruby>さんは <ruby>何時<rt>なんじ</rt></ruby>に <ruby>起<rt>お</rt></ruby>きますか。', options: ['５<ruby>時<rt>じ</rt></ruby>', '６<ruby>時<rt>じ</rt></ruby>', '７<ruby>時<rt>じ</rt></ruby>', '８<ruby>時<rt>じ</rt></ruby>'], correct: 'b' },
                    { num: 3, text: '<ruby>山田<rt>やまだ</rt></ruby>さんは どうやって <ruby>大学<rt>だいがく</rt></ruby>へ <ruby>行<rt>い</rt></ruby>きますか。', options: ['あるいて', 'バスで', 'でんしゃで', 'くるまで'], correct: 'b' },
                    { num: 4, text: '<ruby>家<rt>いえ</rt></ruby>を <ruby>出<rt>で</rt></ruby>るのは <ruby>何時<rt>なんじ</rt></ruby>ですか。', options: ['６<ruby>時<rt>じ</rt></ruby>', '７<ruby>時<rt>じ</rt></ruby>', '８<ruby>時<rt>じ</rt></ruby>', '９<ruby>時<rt>じ</rt></ruby>'], correct: 'c' }
                ]
            },
            {
                id: 2,
                title: 'パッセージ ２：日曜日の出来事',
                text: '<ruby>日曜日<rt>にちようび</rt></ruby>、 わたしは <ruby>友達<rt>ともだち</rt></ruby>と <ruby>動物園<rt>どうぶつえん</rt></ruby>へ <ruby>行<rt>い</rt></ruby>きました。<br>パンダや ライオンを <ruby>見<rt>み</rt></ruby>ました。<br><ruby>昼<rt>ひる</rt></ruby>ご<ruby>飯<rt>はん</rt></ruby>は <ruby>動物園<rt>どうぶつえん</rt></ruby>の <ruby>中<rt>なか</rt></ruby>の レストランで <ruby>食<rt>た</rt></ruby>べました。',
                questions: [
                    { num: 5, text: 'どこへ <ruby>行<rt>い</rt></ruby>きましたか。', options: ['こうえん', 'としょかん', '<ruby>動物園<rt>どうぶつえん</rt></ruby>', 'デパート'], correct: 'c' },
                    { num: 6, text: 'いっしょに <ruby>行<rt>い</rt></ruby>った<ruby>人<rt>ひと</rt></ruby>は だれですか。', options: ['かぞく', 'ひとり', '<ruby>友達<rt>ともだち</rt></ruby>', '<ruby>先生<rt>せんせい</rt></ruby>'], correct: 'c' },
                    { num: 7, text: '<ruby>何<rt>なに</rt></ruby>を <ruby>見<rt>み</rt></ruby>ましたか。', options: ['パンダと ライオン', 'さかなと ねこ', 'くるまと バス', 'ほんと ざっし'], correct: 'a' },
                    { num: 8, text: '<ruby>昼<rt>ひる</rt></ruby>ご<ruby>飯<rt>はん</rt></ruby>は どこで <ruby>食<rt>た</rt></ruby>べましたか。', options: ['うち', '<ruby>外<rt>そと</rt></ruby>の コンビニ', '<ruby>駅<rt>えき</rt></ruby>の レストラン', '<ruby>動物園<rt>どうぶつえん</rt></ruby>の <ruby>中<rt>なか</rt></ruby>の レストラン'], correct: 'd' }
                ]
            },
            {
                id: 3,
                title: 'パッセージ ３：市のプール',
                text: 'ここは <ruby>市<rt>し</rt></ruby>プールです。<br>プールは <ruby>朝<rt>あさ</rt></ruby>９<ruby>時<rt>じ</rt></ruby>から <ruby>夜<rt>よる</rt></ruby>８<ruby>時<rt>じ</rt></ruby>まで あいています。<br><ruby>月曜日<rt>げつようび</rt></ruby>は <ruby>休<rt>やす</rt></ruby>みです。<br><ruby>土曜日<rt>どようび</rt></ruby>と <ruby>日曜日<rt>にちようび</rt></ruby>は <ruby>人<rt>ひと</rt></ruby>が たくさん います。',
                questions: [
                    { num: 9, text: 'プールが あいている <ruby>時間<rt>じかん</rt></ruby>は？', options: ['７<ruby>時<rt>じ</rt></ruby>から６<ruby>時<rt>じ</rt></ruby>まで', '８<ruby>時<rt>じ</rt></ruby>から９<ruby>時<rt>じ</rt></ruby>まで', '９<ruby>時<rt>じ</rt></ruby>から８<ruby>時<rt>じ</rt></ruby>まで', '９<ruby>時<rt>じ</rt></ruby>から９<ruby>時<rt>じ</rt></ruby>まで'], correct: 'c' },
                    { num: 10, text: '<ruby>休<rt>やす</rt></ruby>みの <ruby>日<rt>ひ</rt></ruby>は いつですか。', options: ['<ruby>日曜日<rt>にちようび</rt></ruby>', '<ruby>土曜日<rt>どようび</rt></ruby>', '<ruby>月曜日<rt>げつようび</rt></ruby>', '<ruby>金曜日<rt>きんようび</rt></ruby>'], correct: 'c' },
                    { num: 11, text: 'いつ <ruby>人<rt>ひと</rt></ruby>が たくさん いますか。', options: ['<ruby>月曜日<rt>げつようび</rt></ruby>と <ruby>火曜日<rt>かようび</rt></ruby>', '<ruby>火曜日<rt>かようび</rt></ruby>と <ruby>水曜日<rt>すいようび</rt></ruby>', '<ruby>水曜日<rt>すいようび</rt></ruby>と <ruby>木曜日<rt>もくようび</rt></ruby>', '<ruby>土曜日<rt>どようび</rt></ruby>と <ruby>日曜日<rt>にちようび</rt></ruby>'], correct: 'd' },
                    { num: 12, text: 'このプールについて <ruby>正<rt>ただ</rt></ruby>しいのは どれ？', options: ['<ruby>毎日<rt>まいにち</rt></ruby> あいています。', '<ruby>月曜日<rt>げつようび</rt></ruby>も あいています。', '<ruby>朝<rt>あさ</rt></ruby>９<ruby>時<rt>じ</rt></ruby>から <ruby>夜<rt>よる</rt></ruby>８<ruby>時<rt>じ</rt></ruby>まで つかえます。', '<ruby>夜<rt>よる</rt></ruby>９<ruby>時<rt>じ</rt></ruby>まで つかえます。'], correct: 'c' }
                ]
            },
            {
                id: 4,
                title: 'パッセージ ４：私の趣味',
                text: 'わたしの しゅみは りょうりです。<br><ruby>週末<rt>しゅうまつ</rt></ruby>は よく <ruby>家<rt>いえ</rt></ruby>で <ruby>日本料理<rt>にほんりょうり</rt></ruby>を <ruby>作<rt>つく</rt></ruby>ります。<br>とくに カレーライスと てんぷらが <ruby>好<rt>す</rt></ruby>きです。',
                questions: [
                    { num: 13, text: 'わたしの しゅみは <ruby>何<rt>なん</rt></ruby>ですか।', options: ['サッカー', 'りょうり', 'どくしょ', 'えいが'], correct: 'b' },
                    { num: 14, text: 'いつ よく りょうりを しますか।', options: ['<ruby>毎朝<rt>まいあさ</rt></ruby>', '<ruby>学校<rt>がっこう</rt></ruby>のあと', '<ruby>週末<rt>しゅうまつ</rt></ruby>', '<ruby>夜<rt>よる</rt></ruby>だけ'], correct: 'c' },
                    { num: 15, text: 'どんな りょうりが とくに <ruby>好<rt>す</rt></ruby>きですか।', options: ['カレーライスと てんぷら', 'パスタと ピザ', 'ラーメンと ギョーザ', 'サラダと スープ'], correct: 'a' },
                    { num: 16, text: 'この<ruby>人<rt>ひと</rt></ruby>に ついて <ruby>正<rt>ただ</rt></ruby>しいのは どれ？', options: ['りょうりが きらいです。', '<ruby>日本料理<rt>にほんりょうり</rt></ruby>は つくりません。', '<ruby>週末<rt>しゅうまつ</rt></ruby>に <ruby>日本料理<rt>にほんりょうり</rt></ruby>を よくつくります।', '<ruby>週末<rt>しゅうまつ</rt></ruby>は まったく <ruby>料理<rt>りょうり</rt></ruby>をしません।'], correct: 'c' }
                ]
            },
            {
                id: 5,
                title: 'パッセージ ５：新しいくつ',
                text: 'きのう、 わたしは <ruby>新<rt>あたら</rt></ruby>しい くつを かいました。<br>デパートで セールを していて、 ５０００<ruby>円<rt>えん</rt></ruby>の くつが ３０００<ruby>円<rt>えん</rt></ruby>に なって いました。<br><ruby>色<rt>いろ</rt></ruby>は <ruby>黒<rt>くろ</rt></ruby>で、 とても かるいです।',
                questions: [
                    { num: 17, text: 'どこで くつを かいましたか。', options: ['スーパー', 'コンビニ', 'デパート', 'くつや'], correct: 'c' },
                    { num: 18, text: 'くつの もとの ねだんは いくらでしたか।', options: ['１０００<ruby>円<rt>えん</rt></ruby>', '３０００<ruby>円<rt>えん</rt></ruby>', '５００০<ruby>円<rt>えん</rt></ruby>', '৮০০০<ruby>円<rt>えん</rt></ruby>'], correct: 'c' },
                    { num: 19, text: '<ruby>今<rt>いま</rt></ruby>の ねだんは いくらに なりましたか।', options: ['１００০<ruby>円<rt>えん</rt></ruby>', '২০০০<ruby>円<rt>えん</rt></ruby>', '৩০০০<ruby>円<rt>えん</rt></ruby>', '৪০০০<ruby>円<rt>えん</rt></ruby>'], correct: 'c' },
                    { num: 20, text: 'くつの <ruby>色<rt>いろ</rt></ruby>は <ruby>何<rt>なに</rt></ruby>ですか।', options: ['あか', 'しろ', 'くろ', 'あお'], correct: 'c' }
                ]
            }
        ];

        // 簡単な解説 (ベンガル語)
        const explanations = {
            1: 'লাইনে আছে 「東京の大学で日本語を勉強しています」。',
            2: '「毎朝６時に起きて」 – তাই ৬টা।',
            3: '「バスで大学へ行きます」 লেখা।',
            4: '「８時に家を出て」 – তাই ৮টা।',
            5: 'প্রথম লাইনেই 「動物園へ行きました」。',
            6: '「友達と…行きました」 – বন্ধুর সাথে।',
            7: '「パンダやライオンを見ました」 লেখা।',
            8: '「動物園の中のレストランで食べました」。',
            9: '「朝９時から夜８時まで」 খোলা।',
            10: '「月曜日は休みです」 – সোমবার বন্ধ।',
            11: '「土曜日と日曜日は人がたくさん」。',
            12: 'শুধু C-ই টেক্সটের সাথে মিলে।',
            13: '「しゅみはりょうりです」 – শখ রান্না।',
            14: '「週末はよく…作ります」。',
            15: '「とくにカレーライスとてんぷら」。',
            16: 'তৃতীয় লাইনে সেই কথাই লেখা।',
            17: '「デパートでセールをしていて」。',
            18: '「５０００円のくつが３０００円に」。',
            19: '৫০০০→৩০০০円।',
            20: '「色は黒で」 – রং কালো।'
        };

        // HTML 生成
        function renderPassages() {
            const grid = document.getElementById('quizGrid');
            grid.innerHTML = '';
            
            passages.forEach(passage => {
                const passageDiv = document.createElement('div');
                passageDiv.className = 'passage-card';
                
                let passageHtml = `
                    <div class="passage-title">📌 ${passage.title}</div>
                    <div class="passage-text">${passage.text}</div>
                `;
                
                passage.questions.forEach(q => {
                    let optionsHtml = '';
                    const optLetters = ['a', 'b', 'c', 'd'];
                    q.options.forEach((opt, idx) => {
                        optionsHtml += `<div class="option-btn" onclick="checkAnswer(this, ${q.num}, '${optLetters[idx]}')">${optLetters[idx].toUpperCase()}) ${opt}</div>`;
                    });
                    
                    passageHtml += `
                        <div class="question-card" id="q${q.num}">
                            <div class="q-num">Q${q.num}</div>
                            <div class="question-text">${q.text}</div>
                            <div class="options" id="opt-group-${q.num}">
                                ${optionsHtml}
                            </div>
                            <div class="feedback" id="fb-${q.num}"></div>
                        </div>
                    `;
                });
                
                passageDiv.innerHTML = passageHtml;
                grid.appendChild(passageDiv);
            });
        }

        // 答えをチェック
        function checkAnswer(element, qNum, selectedOpt) {
            const groupId = 'opt-group-' + qNum;
            const options = document.querySelectorAll(`#${groupId} .option-btn`);
            const feedbackDiv = document.getElementById('fb-' + qNum);

            if (options[0].classList.contains('disabled-opt')) return;

            // 正解を探す
            let correctAns = '';
            passages.forEach(p => {
                p.questions.forEach(q => {
                    if (q.num === qNum) correctAns = q.correct;
                });
            });
            
            const isCorrect = (selectedOpt === correctAns);
            options.forEach(opt => opt.classList.add('disabled-opt'));

            options.forEach(opt => {
                if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                    opt.classList.add('correct-opt');
                }
            });

            if (!isCorrect) {
                element.classList.add('wrong-opt');
            }

            const exp = explanations[qNum];
            if (isCorrect) {
                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">⭕ せいかい！</span> 
                        <div>${exp}</div>
                    </div>
                `;
            } else {
                feedbackDiv.innerHTML = `
                    <div class="feedback wrong-fb">
                        <span class="fb-title">❌ まちがい。</span> 正しい答えは緑色です。<br>
                        <div>${exp}</div>
                    </div>
                `;
            }
        }

        // 全ての答えを表示
        function revealAllAnswers() {
            for (let qNum = 1; qNum <= 20; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);
                
                let correctAns = '';
                passages.forEach(p => {
                    p.questions.forEach(q => {
                        if (q.num === qNum) correctAns = q.correct;
                    });
                });
                
                const exp = explanations[qNum];

                options.forEach(opt => {
                    opt.classList.add('disabled-opt');
                    if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                        opt.classList.add('correct-opt');
                    }
                });

                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">✅ 答え：</span> 
                        <div>${exp}</div>
                    </div>
                `;
            }
        }

        // リセット
        function resetAll() {
            for (let qNum = 1; qNum <= 20; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);

                options.forEach(opt => {
                    opt.classList.remove('disabled-opt', 'correct-opt', 'wrong-opt');
                });

                feedbackDiv.innerHTML = '';
            }
        }

        window.onload = renderPassages;
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
</body>
</html>
