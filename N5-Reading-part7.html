                    { num: 140, text: 'この <ruby>文<rt>ぶん</rt></ruby>から わかる ことは どれですか।', options: ['<ruby>快速<rt>かいそく</rt></ruby>は <ruby>普通<rt>ふつう</rt></ruby>より おそい です。', '<ruby>普通<rt>ふつう</rt></ruby>は <ruby>快速<rt>かいそく</rt></ruby>より <ruby>早<rt>はや</rt></ruby>く <ruby>着<rt>つ</rt></ruby>きます。', '<ruby>快速<rt>かいそく</rt></ruby>は <ruby>普通<rt>ふつう</rt></ruby>より <ruby>早<rt>はや</rt></ruby>く Ｂ<ruby>駅<rt>えき</rt></ruby>に <ruby>着<rt>つ</rt></ruby>きます。', '<ruby>普通<rt>ふつう</rt></ruby>と <ruby>快速<rt>かいそく</rt></ruby>は <ruby>同<rt>おな</rt></ruby>じ <ruby>時間<rt>じかん</rt></ruby>に <ruby>着<rt>つ</rt></ruby>きます।'], correct: 'c' }
                ]
            }
        ];

        // 簡単な解説 (ベンガル語)
        const explanations = {
            121: 'প্রথম লাইনে “来月…文化祭があります”, দ্বিতীয় লাইনে “土曜日と日曜日の二日間です” → পরের মাসের শনি+রবি।',
            122: '“二日間です” → দুই দিন ধরে।',
            123: '“土曜日は午前１０時から始まり” → সকাল ১০টা।',
            124: '“日曜日は午後３時に終わります” → বিকেল ৩টায় শেষ।',
            125: 'প্রথম লাইনে “５さつまで借りることができます” → ৫টা বই ধার নেওয়া যায়।',
            126: '“本は２週間借りられます” → দুই সপ্তাহ।',
            127: '“お金をはらわなければなりません” → জরিমানা গুনতে হবে।',
            128: 'সময়মতো না দিলে পয়সা লাগে; A,B,D টেক্সটের সাথে মিলছে না।',
            129: 'প্রথম লাইনে “会社員です” লেখা → অফিস কর্মী।',
            130: '“６時半に起きて” → ৬টা ৩০।',
            131: '“８時に家を出て” → ৮টা।',
            132: '“９時から５時までです” → শেষ ৫টা।',
            133: '“アパートの住んでいるみなさんへ” → অ্যাপার্টমেন্টের নোটিশ।',
            134: '“来週の土曜日の午前９時から” → পরের সপ্তাহের শনিবার।',
            135: '“その時間、エレベーターはつかえません” লেখা → লিফট বন্ধ।',
            136: '“ゴミは金曜日の夜までに出してください” → শুক্রবার রাতের আগে ফেলতে হবে।',
            137: 'টেবিলে “９：１５　快速” লেখা আছে।',
            138: 'তালিকায় 普通 লেখা আছে ৯:০০ আর ৯:৩০–এর পাশে।',
            139: '快速 আছে ৯:১৫ এবং ৯:৪৫ – মোট ২টা।',
            140: 'শেষ লাইনে “快速の電車は、普通の電車より早くＢ駅に着きます” স্পষ্টভাবে বলা আছে।'
        };

        // HTML 生成
        function renderPassages() {
            const grid = document.getElementById('quizGrid');
            grid.innerHTML = '';
            
            passages.forEach(passage => {
                const passageDiv = document.createElement('div');
                passageDiv.className = 'passage-card';
                
                let passageHtml = `
                    <div class="passage-title">📌 ${passage.title}</div>
                    <div class="passage-text">${passage.text}</div>
                `;
                
                passage.questions.forEach(q => {
                    let optionsHtml = '';
                    const optLetters = ['a', 'b', 'c', 'd'];
                    q.options.forEach((opt, idx) => {
                        optionsHtml += `<div class="option-btn" onclick="checkAnswer(this, ${q.num}, '${optLetters[idx]}')">${optLetters[idx].toUpperCase()}) ${opt}</div>`;
                    });
                    
                    passageHtml += `
                        <div class="question-card" id="q${q.num}">
                            <div class="q-num">Q${q.num}</div>
                            <div class="question-text">${q.text}</div>
                            <div class="options" id="opt-group-${q.num}">
                                ${optionsHtml}
                            </div>
                            <div class="feedback" id="fb-${q.num}"></div>
                        </div>
                    `;
                });
                
                passageDiv.innerHTML = passageHtml;
                grid.appendChild(passageDiv);
            });
        }

        // 答えをチェック
        function checkAnswer(element, qNum, selectedOpt) {
            const groupId = 'opt-group-' + qNum;
            const options = document.querySelectorAll(`#${groupId} .option-btn`);
            const feedbackDiv = document.getElementById('fb-' + qNum);

            if (options[0].classList.contains('disabled-opt')) return;

            // 正解を探す
            let correctAns = '';
            passages.forEach(p => {
                p.questions.forEach(q => {
                    if (q.num === qNum) correctAns = q.correct;
                });
            });
            
            const isCorrect = (selectedOpt === correctAns);
            options.forEach(opt => opt.classList.add('disabled-opt'));

            options.forEach(opt => {
                if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                    opt.classList.add('correct-opt');
                }
            });

            if (!isCorrect) {
                element.classList.add('wrong-opt');
            }

            const exp = explanations[qNum];
            if (isCorrect) {
                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">⭕ せいかい！</span> 
                        <div>${exp}</div>
                    </div>
                `;
            } else {
                feedbackDiv.innerHTML = `
                    <div class="feedback wrong-fb">
                        <span class="fb-title">❌ まちがい。</span> 正しい答えは緑色です。<br>
                        <div>${exp}</div>
                    </div>
                `;
            }
        }

        // 全ての答えを表示
        function revealAllAnswers() {
            for (let qNum = 121; qNum <= 140; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);
                
                let correctAns = '';
                passages.forEach(p => {
                    p.questions.forEach(q => {
                        if (q.num === qNum) correctAns = q.correct;
                    });
                });
                
                const exp = explanations[qNum];

                options.forEach(opt => {
                    opt.classList.add('disabled-opt');
                    if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                        opt.classList.add('correct-opt');
                    }
                });

                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">✅ 答え：</span> 
                        <div>${exp}</div>
                    </div>
                `;
            }
        }

        // リセット
        function resetAll() {
            for (let qNum = 121; qNum <= 140; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);

                options.forEach(opt => {
                    opt.classList.remove('disabled-opt', 'correct-opt', 'wrong-opt');
                });

                feedbackDiv.innerHTML = '';
            }
        }

        window.onload = renderPassages;
    </script>
