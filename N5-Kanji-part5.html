<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N5 漢字クイズ - パート5 (問題61-75) ふりがな付き</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hind Siliguri', 'Noto Sans Bengali', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            background: linear-gradient(145deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #0c4a6e;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 40px 40px 20px 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-bottom: 6px solid #0284c7;
            text-align: center;
        }

        h1 {
            font-size: 2.4em;
            font-weight: 700;
            color: #0369a1;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 span {
            background: #0284c7;
            color: white;
            font-size: 0.45em;
            padding: 6px 20px;
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .subhead {
            font-size: 1.2em;
            color: #0369a1;
            background: #f0f9ff;
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-block;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed #7dd3fc;
            font-weight: 600;
            color: #0369a1;
        }

        .badge {
            background: #0369a1;
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 1em;
        }

        .quiz-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-card {
            background: white;
            border-radius: 30px;
            padding: 25px 30px;
            box-shadow: 0 10px 25px rgba(2, 132, 199, 0.1);
            transition: transform 0.2s;
            border: 2px solid #bae6fd;
        }

        .question-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px rgba(2, 132, 199, 0.2);
            border-color: #38bdf8;
        }

        .q-num {
            display: inline-block;
            background: #0284c7;
            color: white;
            font-weight: 600;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 1rem;
            margin-bottom: 18px;
            letter-spacing: 0.5px;
        }

        .sentence {
            font-size: 1.8em;
            margin-bottom: 20px;
            line-height: 2.2;
            background: #f0f9ff;
            padding: 20px 25px;
            border-radius: 25px;
            border: 2px solid #bae6fd;
            font-weight: 600;
            color: #075985;
            text-align: center;
            word-break: break-word;
        }

        .highlight-kanji {
            display: inline-block;
            background: #fee2e2;
            color: #b91c1c;
            font-weight: 700;
            padding: 4px 15px;
            border-radius: 40px;
            border: 2px solid #fecaca;
            margin: 0 5px;
            font-size: 1.2em;
        }

        .question-text {
            font-size: 1.3em;
            margin-bottom: 15px;
            font-weight: 500;
            color: #075985;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 20px 0 15px;
        }

        .option-btn {
            background: white;
            border: 3px solid #bae6fd;
            padding: 18px 12px;
            border-radius: 60px;
            font-size: 1.3em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            color: #075985;
            box-shadow: 0 5px 10px rgba(0,0,0,0.02);
        }

        .option-btn:hover:not(.disabled-opt) {
            background: #e0f2fe;
            border-color: #0284c7;
            transform: scale(1.01);
            box-shadow: 0 10px 15px rgba(2,132,199,0.15);
        }

        .correct-opt {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            box-shadow: 0 5px 15px rgba(34,197,94,0.25);
        }

        .wrong-opt {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #7f1d1d !important;
            opacity: 0.9;
        }

        .disabled-opt {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        .feedback {
            margin-top: 20px;
            padding: 18px 22px;
            border-radius: 25px;
            background: #f8fafc;
            border-left: 8px solid #64748b;
            font-size: 1.1em;
            line-height: 1.7;
            border: 1px solid #cbd5e1;
        }

        .feedback.correct-fb {
            background: #f0fdf4;
            border-left-color: #22c55e;
        }

        .feedback.wrong-fb {
            background: #fef2f2;
            border-left-color: #ef4444;
        }

        .fb-title {
            font-weight: 700;
            margin-right: 10px;
            font-size: 1.1em;
        }

        .rule {
            background: #fffbeb;
            padding: 10px 15px;
            border-radius: 20px;
            margin-top: 10px;
            border-left: 5px solid #f59e0b;
            font-size: 0.95em;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 40px 0 30px;
            justify-content: center;
        }

        .primary-btn, .secondary-btn {
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 2px solid transparent;
        }

        .primary-btn {
            background: #0284c7;
            color: white;
        }

        .primary-btn:hover {
            background: #0369a1;
            transform: translateY(-4px);
            box-shadow: 0 20px 30px rgba(2,132,199,0.35);
        }

        .secondary-btn {
            background: #1e293b;
            color: white;
        }

        .secondary-btn:hover {
            background: #0f172a;
            transform: translateY(-4px);
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            color: #0369a1;
            font-size: 1rem;
            background: white;
            padding: 20px;
            border-radius: 70px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 2px solid #bae6fd;
        }

        hr {
            border: none;
            height: 3px;
            background: linear-gradient(to right, transparent, #0284c7, transparent);
            margin: 30px 0;
        }

        @media (max-width: 700px) {
            h1 { font-size: 2em; }
            .sentence { font-size: 1.5em; }
            .options { grid-template-columns: 1fr; }
            .option-btn { padding: 15px; }
        }

        /* furigana styling */
        ruby {
            ruby-align: center;
        }
        rt {
            font-size: 0.6em;
            color: #0284c7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                📘 JLPT N5 漢字クイズ
                <span>Part 5 (61-75)</span>
            </h1>
            <div class="subhead">
                かんじの よみかたを えらんでください。（ふりがな付き）
            </div>
            <div class="stats">
                <span>🈳 全15問</span>
                <span class="badge">レベル N5 · 漢字</span>
            </div>
        </div>

        <div class="quiz-grid" id="quizGrid">
            <!-- JavaScriptで生成 -->
        </div>

        <div class="action-buttons">
            <button class="primary-btn" onclick="revealAllAnswers()">✅ 全ての答えを見る</button>
            <button class="secondary-btn" onclick="resetAll()">🔄 リセット</button>
        </div>

        <hr>
        <div class="footer">
            ⚡ 日本語能力試験 N5 対策 | 解説はベンガル語（とても簡単な説明）
        </div>
    </div>

    <script>
        // 質問データ (問題61-75) with furigana - JLPT N5 official style
        const questions = [
            // Type 1: Kanji reading questions (もんだい１ style)
            { 
                num: 61, 
                type: 'reading',
                sentence: 'らい <span class="highlight-kanji">【年】</span> <ruby>日本<rt>にほん</rt></ruby>へ <ruby>行<rt>い</rt></ruby>きたい です。',
                question: '【年】の 読(よ)み方(かた)は どれですか。',
                options: ['とし', 'ねん', 'ひ', 'つき'], 
                correct: 'a' 
            },
            { 
                num: 62, 
                type: 'reading',
                sentence: '<span class="highlight-kanji">【去年】</span>は とても いそがしかった です。',
                question: '【去年】の 読み方は？',
                options: ['きょねん', 'ことし', 'らいねん', 'まいとし'], 
                correct: 'a' 
            },
            { 
                num: 63, 
                type: 'reading',
                sentence: 'きょう は とても<span class="highlight-kanji">【暑】</span>い です ね。',
                question: '【暑】の 読み方は？（weather গরম）',
                options: ['あつ', 'あつい', 'さむい', 'つよい'], 
                correct: 'b' 
            },
            { 
                num: 64, 
                type: 'reading',
                sentence: 'さむい <ruby>日<rt>ひ</rt></ruby>は <span class="highlight-kanji">【風】</span>が つよい です。',
                question: '【風】の 読み方は？',
                options: ['かぜ', 'かみ', 'かど', 'かわ'], 
                correct: 'a' 
            },
            { 
                num: 65, 
                type: 'reading',
                sentence: '<ruby>毎朝<rt>まいあさ</rt></ruby> <span class="highlight-kanji">【新聞】</span>を よみます。',
                question: '【新聞】の 読み方は？',
                options: ['しんもん', 'しんぶん', 'じんぶん', 'しんぼん'], 
                correct: 'b' 
            },
            { 
                num: 66, 
                type: 'reading',
                sentence: 'この <span class="highlight-kanji">【教室】</span>は とても ひろい です。',
                question: '【教室】の 読み方は？',
                options: ['きょうしつ', 'きょうじつ', 'きょうへや', 'きょうばこ'], 
                correct: 'a' 
            },
            { 
                num: 67, 
                type: 'reading',
                sentence: 'いま <span class="highlight-kanji">【映画館】</span>に います。',
                question: '【映画館】の 読み方は？',
                options: ['えいがや', 'えいがかん', 'えいえいかん', 'えいがえき'], 
                correct: 'b' 
            },
            { 
                num: 68, 
                type: 'reading',
                sentence: 'きょう は <span class="highlight-kanji">【会社】</span>を <ruby>休<rt>やす</rt></ruby>みました。',
                question: '【会社】の 読み方は？',
                options: ['かいしゃ', 'かいしつ', 'かいしゃいん', 'かいしょ'], 
                correct: 'a' 
            },
            { 
                num: 69, 
                type: 'reading',
                sentence: 'きょう の <span class="highlight-kanji">【天気】</span>は どう ですか。',
                question: '【天気】の 読み方は？',
                options: ['てんき', 'げんき', 'でんき', 'きてん'], 
                correct: 'a' 
            },
            { 
                num: 70, 
                type: 'reading',
                sentence: 'あした の <span class="highlight-kanji">【予定】</span>を おしえて ください。',
                question: '【予定】の 読み方は？',
                options: ['よてい', 'よてん', 'よてき', 'よてんき'], 
                correct: 'a' 
            },
            { 
                num: 71, 
                type: 'reading',
                sentence: 'わたし は <span class="highlight-kanji">【大学生】</span>です。',
                question: '【大学生】の 読み方は？',
                options: ['だいがくしょう', 'だいがくせい', 'たいがくせい', 'だいせいがく'], 
                correct: 'b' 
            },
            { 
                num: 72, 
                type: 'reading',
                sentence: '<ruby>母<rt>はは</rt></ruby>は <span class="highlight-kanji">【料理】</span>が じょうず です。',
                question: '【料理】の 読み方は？',
                options: ['りょうに', 'りょうり', 'りょうじ', 'りょり'], 
                correct: 'b' 
            },
            { 
                num: 73, 
                type: 'reading',
                sentence: 'この <span class="highlight-kanji">【写真】</span>を <ruby>見<rt>み</rt></ruby>て ください。',
                question: '【写真】の 読み方は？',
                options: ['しゃしん', 'しゃじん', 'しゃし', 'しゃじ'], 
                correct: 'a' 
            },
            { 
                num: 74, 
                type: 'reading',
                sentence: '<span class="highlight-kanji">【自転車】</span>で <ruby>学校<rt>がっこう</rt></ruby>へ <ruby>行<rt>い</rt></ruby>きます。',
                question: '【自転車】の 読み方は？',
                options: ['じてんしゃ', 'じでんしゃ', 'じてんくるま', 'じしゃてん'], 
                correct: 'a' 
            },
            { 
                num: 75, 
                type: 'reading',
                sentence: 'まい<ruby>朝<rt>あさ</rt></ruby> <span class="highlight-kanji">【新聞】</span>と <span class="highlight-kanji">【牛乳】</span>を かいます。',
                question: '【牛乳】の 読み方は？',
                options: ['うしにゅう', 'ぎゅうにゅう', 'ぎゅうみるく', 'ぎゅにゅう'], 
                correct: 'b' 
            }
        ];

        // 簡単な解説 (ベンガル語) - খুব সহজ ভাষায়
        const explanations = {
            61: '【年】 = とし (বছর/বয়স)। এখানে "らいとし" নয়, "らいねん" শব্দে 年 পড়ে ねん, কিন্তু একক "年" とし।',
            62: '【去年】 = きょねん (গত বছর)। 今年 = ことし, 来年 = らいねん।',
            63: '【暑い】 = あつい (গরম, আবহাওয়া)। 熱い (あつい) গরম বস্তু।',
            64: '【風】 = かぜ (বাতাস)। 風邪 (かぜ) = সর্দি।',
            65: '【新聞】 = しんぶん (খবরের কাগজ)।',
            66: '【教室】 = きょうしつ (ক্লাসরুম)।',
            67: '【映画館】 = えいがかん (সিনেমা হল)।',
            68: '【会社】 = かいしゃ (কোম্পানি)।',
            69: '【天気】 = てんき (আবহাওয়া)।',
            70: '【予定】 = よてい (প্ল্যান/সিডিউল)।',
            71: '【大学生】 = だいがくせい (ইউনিভার্সিটি স্টুডেন্ট)।',
            72: '【料理】 = りょうり (রান্না)।',
            73: '【写真】 = しゃしん (ছবি/ফটো)।',
            74: '【自転車】 = じてんしゃ (সাইকেল)।',
            75: '【牛乳】 = ぎゅうにゅう (দুধ)।'
        };

        // HTML 生成
        function renderQuestions() {
            const grid = document.getElementById('quizGrid');
            grid.innerHTML = '';
            
            questions.forEach(q => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${q.num}`;
                
                let optionsHtml = '';
                const optLetters = ['a', 'b', 'c', 'd'];
                q.options.forEach((opt, idx) => {
                    optionsHtml += `<div class="option-btn" onclick="checkAnswer(this, ${q.num}, '${optLetters[idx]}')">${optLetters[idx].toUpperCase()}) ${opt}</div>`;
                });

                card.innerHTML = `
                    <div class="q-num">Q${q.num}</div>
                    <div class="sentence">${q.sentence}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options" id="opt-group-${q.num}">
                        ${optionsHtml}
                    </div>
                    <div class="feedback" id="fb-${q.num}"></div>
                `;
                grid.appendChild(card);
            });
        }

        // 答えをチェック
        function checkAnswer(element, qNum, selectedOpt) {
            const groupId = 'opt-group-' + qNum;
            const options = document.querySelectorAll(`#${groupId} .option-btn`);
            const feedbackDiv = document.getElementById('fb-' + qNum);

            if (options[0].classList.contains('disabled-opt')) return;

            const q = questions.find(q => q.num === qNum);
            const correctAns = q.correct;
            const isCorrect = (selectedOpt === correctAns);

            options.forEach(opt => opt.classList.add('disabled-opt'));

            options.forEach(opt => {
                if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                    opt.classList.add('correct-opt');
                }
            });

            if (!isCorrect) {
                element.classList.add('wrong-opt');
            }

            const exp = explanations[qNum];
            if (isCorrect) {
                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">⭕ せいかい！</span> 
                        <div class="rule">${exp}</div>
                    </div>
                `;
            } else {
                feedbackDiv.innerHTML = `
                    <div class="feedback wrong-fb">
                        <span class="fb-title">❌ まちがい。</span> 正しい答えは緑色です。<br>
                        <div class="rule">${exp}</div>
                    </div>
                `;
            }
        }

        // 全ての答えを表示
        function revealAllAnswers() {
            for (let qNum = 61; qNum <= 75; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);
                const q = questions.find(q => q.num === qNum);
                const correctAns = q.correct;
                const exp = explanations[qNum];

                options.forEach(opt => {
                    opt.classList.add('disabled-opt');
                    if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                        opt.classList.add('correct-opt');
                    }
                });

                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">✅ 答え：</span> 
                        <div class="rule">${exp}</div>
                    </div>
                `;
            }
        }

        // リセット
        function resetAll() {
            for (let qNum = 61; qNum <= 75; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);

                options.forEach(opt => {
                    opt.classList.remove('disabled-opt', 'correct-opt', 'wrong-opt');
                });

                feedbackDiv.innerHTML = '';
            }
        }

        window.onload = renderQuestions;
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
</body>
</html>
