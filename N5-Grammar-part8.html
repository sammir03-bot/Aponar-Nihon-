<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N5 文法クイズ - パート8 (問題141-160) ふりがな付き</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hind Siliguri', 'Noto Sans Bengali', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            background: linear-gradient(145deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #0c4a6e;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 40px 40px 20px 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-bottom: 6px solid #0284c7;
            text-align: center;
        }

        h1 {
            font-size: 2.4em;
            font-weight: 700;
            color: #0369a1;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 span {
            background: #0284c7;
            color: white;
            font-size: 0.45em;
            padding: 6px 20px;
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .subhead {
            font-size: 1.2em;
            color: #0369a1;
            background: #f0f9ff;
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-block;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed #7dd3fc;
            font-weight: 600;
            color: #0369a1;
        }

        .badge {
            background: #0369a1;
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 1em;
        }

        .quiz-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-card {
            background: white;
            border-radius: 30px;
            padding: 25px 30px;
            box-shadow: 0 10px 25px rgba(2, 132, 199, 0.1);
            transition: transform 0.2s;
            border: 2px solid #bae6fd;
        }

        .question-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px rgba(2, 132, 199, 0.2);
            border-color: #38bdf8;
        }

        .q-num {
            display: inline-block;
            background: #0284c7;
            color: white;
            font-weight: 600;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 1rem;
            margin-bottom: 18px;
            letter-spacing: 0.5px;
        }

        .sentence {
            font-size: 1.8em;
            margin-bottom: 20px;
            line-height: 2.2;
            background: #f0f9ff;
            padding: 20px 25px;
            border-radius: 25px;
            border: 2px solid #bae6fd;
            font-weight: 600;
            color: #075985;
            text-align: center;
            word-break: break-word;
        }

        .blank {
            display: inline-block;
            background: #fee2e2;
            color: #b91c1c;
            font-weight: 700;
            padding: 4px 15px;
            border-radius: 40px;
            border: 2px dashed #ef4444;
            margin: 0 5px;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 20px 0 15px;
        }

        .option-btn {
            background: white;
            border: 3px solid #bae6fd;
            padding: 18px 12px;
            border-radius: 60px;
            font-size: 1.3em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            color: #075985;
            box-shadow: 0 5px 10px rgba(0,0,0,0.02);
        }

        .option-btn:hover:not(.disabled-opt) {
            background: #e0f2fe;
            border-color: #0284c7;
            transform: scale(1.01);
            box-shadow: 0 10px 15px rgba(2,132,199,0.15);
        }

        .correct-opt {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            box-shadow: 0 5px 15px rgba(34,197,94,0.25);
        }

        .wrong-opt {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #7f1d1d !important;
            opacity: 0.9;
        }

        .disabled-opt {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        .feedback {
            margin-top: 20px;
            padding: 18px 22px;
            border-radius: 25px;
            background: #f8fafc;
            border-left: 8px solid #64748b;
            font-size: 1.1em;
            line-height: 1.7;
            border: 1px solid #cbd5e1;
        }

        .feedback.correct-fb {
            background: #f0fdf4;
            border-left-color: #22c55e;
        }

        .feedback.wrong-fb {
            background: #fef2f2;
            border-left-color: #ef4444;
        }

        .fb-title {
            font-weight: 700;
            margin-right: 10px;
            font-size: 1.1em;
        }

        .rule {
            background: #fffbeb;
            padding: 10px 15px;
            border-radius: 20px;
            margin-top: 10px;
            border-left: 5px solid #f59e0b;
            font-size: 0.95em;
        }

        .translation {
            background: #e0f2fe;
            padding: 8px 15px;
            border-radius: 20px;
            margin-top: 8px;
            font-style: italic;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 40px 0 30px;
            justify-content: center;
        }

        .primary-btn, .secondary-btn {
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 2px solid transparent;
        }

        .primary-btn {
            background: #0284c7;
            color: white;
        }

        .primary-btn:hover {
            background: #0369a1;
            transform: translateY(-4px);
            box-shadow: 0 20px 30px rgba(2,132,199,0.35);
        }

        .secondary-btn {
            background: #1e293b;
            color: white;
        }

        .secondary-btn:hover {
            background: #0f172a;
            transform: translateY(-4px);
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            color: #0369a1;
            font-size: 1rem;
            background: white;
            padding: 20px;
            border-radius: 70px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 2px solid #bae6fd;
        }

        hr {
            border: none;
            height: 3px;
            background: linear-gradient(to right, transparent, #0284c7, transparent);
            margin: 30px 0;
        }

        @media (max-width: 700px) {
            h1 { font-size: 2em; }
            .sentence { font-size: 1.5em; }
            .options { grid-template-columns: 1fr; }
            .option-btn { padding: 15px; }
        }

        /* furigana styling */
        ruby {
            ruby-align: center;
        }
        rt {
            font-size: 0.6em;
            color: #0284c7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                📘 JLPT N5 文法クイズ
                <span>Part 8 (141-160)</span>
            </h1>
            <div class="subhead">
                正しい助詞・文法を選んでください。（ふりがな付き）
            </div>
            <div class="stats">
                <span>🈳 全20問</span>
                <span class="badge">レベル N5 · 文法</span>
            </div>
        </div>

        <div class="quiz-grid" id="quizGrid">
            <!-- JavaScriptで生成 -->
        </div>

        <div class="action-buttons">
            <button class="primary-btn" onclick="revealAllAnswers()">✅ 全ての答えを見る</button>
            <button class="secondary-btn" onclick="resetAll()">🔄 リセット</button>
        </div>

        <hr>
        <div class="footer">
            ⚡ 日本語能力試験 N5 対策 | 解説はベンガル語（簡単なルール説明）
        </div>
    </div>

    <script>
        // 質問データ (問題141-160) with furigana using <ruby> tags
        const questions = [
            { num: 141, sentence: 'この<ruby>問題<rt>もんだい</rt></ruby>はちょっとむずかしすぎるから、<ruby>先生<rt>せんせい</rt></ruby>に<ruby>聞<rt>き</rt></ruby>い（　）みます。', options: ['て', 'た', 'る', 'ない'], correct: 'a' },
            { num: 142, sentence: '<ruby>友達<rt>ともだち</rt></ruby>に<ruby>手紙<rt>てがみ</rt></ruby>を<ruby>書<rt>か</rt></ruby>い（　）しまいました。', options: ['て', 'た', 'る', 'ない'], correct: 'a' },
            { num: 143, sentence: 'これからも<ruby>日本語<rt>にほんご</rt></ruby>を<ruby>勉強<rt>べんきょう</rt></ruby>し（　）いきます。', options: ['て', 'た', 'る', 'ない'], correct: 'a' },
            { num: 144, sentence: 'ちょっとトイレに<ruby>行<rt>い</rt></ruby>っ（　）きます。', options: ['て', 'た', 'る', 'ない'], correct: 'a' },
            { num: 145, sentence: 'この<ruby>漢字<rt>かんじ</rt></ruby>の<ruby>読<rt>よ</rt></ruby>（　）<ruby>方<rt>かた</rt></ruby>を<ruby>教<rt>おし</rt></ruby>えてください。', options: ['み', 'みかた', 'よみ', 'よみかた'], correct: 'c' },
            { num: 146, sentence: 'この<ruby>靴<rt>くつ</rt></ruby>は<ruby>歩<rt>ある</rt></ruby>き（　）くて、とてもいいです。', options: ['やす', 'やす', 'やすく', 'やすい'], correct: 'b' },
            { num: 147, sentence: 'この<ruby>本<rt>ほん</rt></ruby>はちょっと<ruby>読<rt>よ</rt></ruby>み（　）かったです。', options: ['にく', 'にくい', 'にくか', 'にくく'], correct: 'd' },
            { num: 148, sentence: '<ruby>日本<rt>にほん</rt></ruby>に<ruby>行<rt>い</rt></ruby>っ（　）ことがありますか।', options: ['た', 'て', 'る', 'ない'], correct: 'a' },
            { num: 149, sentence: '<ruby>日曜日<rt>にちようび</rt></ruby>は<ruby>映画<rt>えいが</rt></ruby>を<ruby>見<rt>み</rt></ruby>（　）り、<ruby>本<rt>ほん</rt></ruby>を<ruby>読<rt>よ</rt></ruby>んだりします।', options: ['た', 'て', 'る', 'ない'], correct: 'a' },
            { num: 150, sentence: 'ここで<ruby>写真<rt>しゃしん</rt></ruby>をとっ（　）もいいですか।', options: ['て', 'た', 'る', 'ない'], correct: 'a' },
            { num: 151, sentence: 'ここでタバコを<ruby>吸<rt>す</rt></ruby>（　）はいけません।', options: ['って', 'った', 'っては', 'ったり'], correct: 'c' },
            { num: 152, sentence: '<ruby>明日<rt>あした</rt></ruby>は<ruby>早<rt>はや</rt></ruby>く<ruby>起<rt>お</rt></ruby>き（　）なければなりません।', options: ['な', 'なく', 'ない', 'なら'], correct: 'a' },
            { num: 153, sentence: 'どうして<ruby>学校<rt>がっこう</rt></ruby>を<ruby>休<rt>やす</rt></ruby>んだ（　）ですか।', options: ['の', 'ん', 'こと', 'もの'], correct: 'a' },
            { num: 154, sentence: '<ruby>昨日<rt>きのう</rt></ruby>は<ruby>頭<rt>あたま</rt></ruby>が<ruby>痛<rt>いた</rt></ruby>かっ（　）んです।', options: ['た', 'て', 'たの', 'たん'], correct: 'a' },
            { num: 155, sentence: 'コーヒーが<ruby>飲<rt>の</rt></ruby>み（　）です।', options: ['たい', 'たかった', 'たくない', 'たかっ'], correct: 'a' },
            { num: 156, sentence: 'わたしはあまり<ruby>肉<rt>にく</rt></ruby>を<ruby>食<rt>た</rt></ruby>べ（　）。', options: ['たい', 'たくない', 'たかった', 'たくなかった'], correct: 'b' },
            { num: 157, sentence: 'ご<ruby>飯<rt>はん</rt></ruby>を<ruby>食<rt>た</rt></ruby>べ（　）から、<ruby>歯<rt>は</rt></ruby>を<ruby>磨<rt>みが</rt></ruby>きます।', options: ['た', 'て', 'る', 'ない'], correct: 'a' },
            { num: 158, sentence: '<ruby>寝<rt>ね</rt></ruby>る（　）に、<ruby>本<rt>ほん</rt></ruby>を<ruby>読<rt>よ</rt></ruby>みます।', options: ['まえ', 'あと', 'とき', 'ながら'], correct: 'a' },
            { num: 159, sentence: '<ruby>音楽<rt>おんがく</rt></ruby>を<ruby>聞<rt>き</rt></ruby>き（　）<ruby>勉強<rt>べんきょう</rt></ruby>します।', options: ['ながら', 'たり', 'て', 'た'], correct: 'a' },
            { num: 160, sentence: '<ruby>雨<rt>あめ</rt></ruby>が<ruby>降<rt>ふ</rt></ruby>っ（　）いるから、<ruby>出<rt>で</rt></ruby>かけません।', options: ['て', 'た', 'ている', 'てい'], correct: 'a' }
        ];

        // 詳細な解説 (ベンガル語) - সরল ভাষায়
        const explanations = {
            141: {
                rule: '「てみる」 = "চেষ্টা করে দেখা"',
                translation: 'এই সমস্যাটা একটু কঠিন, তাই স্যারকে জিজ্ঞেস করে দেখব।',
                detail: '「聞いてみます」 = জিজ্ঞেস করে দেখব।'
            },
            142: {
                rule: '「てしまう」 = "পুরো করে ফেলা/অনুশোচনা"',
                translation: 'বন্ধুকে চিঠি লিখে ফেলেছি।',
                detail: '「書いてしまいました」 = লিখে ফেলেছি।'
            },
            143: {
                rule: '「ていく」 = "চালিয়ে যাওয়া"',
                translation: 'এখন থেকেও জাপানি পড়তে থাকব।',
                detail: '「勉強していきます」 = পড়তে থাকব।'
            },
            144: {
                rule: '「てくる」 = "গিয়ে আসা"',
                translation: 'একটু টয়লেটে গিয়ে আসি।',
                detail: '「行ってきます」 = গিয়ে আসি।'
            },
            145: {
                rule: '「読み方」 = "পড়ার পদ্ধতি"',
                translation: 'এই কাঞ্জির পড়ার পদ্ধতি শিখিয়ে দিন।',
                detail: '「読み方」 = পড়ার পদ্ধতি।'
            },
            146: {
                rule: '「やすい」 = "করা সহজ" (verb stem + やすい)',
                translation: 'এই জুতো হাঁটতে সহজ এবং খুব ভালো।',
                detail: '「歩きやすい」 = হাঁটতে সহজ।'
            },
            147: {
                rule: '「にくい」 = "করা কঠিন" (verb stem + にくい), অতীত = にくかった',
                translation: 'এই বইটা একটু পড়তে কষ্ট হয়েছিল।',
                detail: '「読みにくかった」 = পড়তে কষ্ট হয়েছিল।'
            },
            148: {
                rule: '「たことがある」 = "অভিজ্ঞতা আছে"',
                translation: 'জাপানে গিয়েছ কি?',
                detail: '「行ったことがありますか」 = গিয়েছ?'
            },
            149: {
                rule: '「たり～たりする」 = "কখনও এক কাজ, কখনও অন্য কাজ"',
                translation: 'রোববার সিনেমা দেখি বা বই পড়ি।',
                detail: '「見たり、読んだり」 = দেখা বা পড়া।'
            },
            150: {
                rule: '「てもいい」 = অনুমতি চাওয়া',
                translation: 'এখানে ছবি তুলতে পারি?',
                detail: '「とってもいいですか」 = তুলতে পারি?'
            },
            151: {
                rule: '「てはいけません」 = নিষেধ',
                translation: 'এখানে ধূমপান করা যাবে না।',
                detail: '「吸ってはいけません」 = ধূমপান নিষেধ।'
            },
            152: {
                rule: '「なければなりません」 = "বাধ্যতামূলক"',
                translation: 'আগামীকাল তাড়াতাড়ি উঠতে হবে।',
                detail: '「起きなければなりません」 = উঠতেই হবে।'
            },
            153: {
                rule: '「んですか」 = কারণ জানতে চাওয়া',
                translation: 'কেন স্কুলে আসেননি?',
                detail: '「休んだんですか」 = ছুটি নিয়েছেন?'
            },
            154: {
                rule: '「んです」 = ব্যাখ্যা দেওয়া',
                translation: 'গতকাল মাথা ব্যথা ছিল।',
                detail: '「痛かったんです」 = ব্যথা ছিল।'
            },
            155: {
                rule: '「たい」 = ইচ্ছা প্রকাশ',
                translation: 'কফি খেতে চাই।',
                detail: '「飲みたいです」 = খেতে চাই।'
            },
            156: {
                rule: '「たくない」 = নেতিবাচক ইচ্ছা',
                translation: 'আমি খুব বেশি মাংস খেতে চাই না।',
                detail: '「食べたくないです」 = খেতে চাই না।'
            },
            157: {
                rule: '「たから」 = "করার পর থেকে"',
                translation: 'খাওয়ার পর দাঁত ব্রাশ করি।',
                detail: '「食べたから」 = খাওয়ার পর।'
            },
            158: {
                rule: '「前に」 = "করার আগে"',
                translation: 'ঘুমানোর আগে বই পড়ি।',
                detail: '「寝る前に」 = ঘুমানোর আগে।'
            },
            159: {
                rule: '「ながら」 = "করতে করতে"',
                translation: 'গান শুনতে শুনতে পড়ি।',
                detail: '「聞きながら」 = শুনতে শুনতে।'
            },
            160: {
                rule: '「ている」 = চলমান অবস্থা; এখানে blank-এ 「て」 প্রয়োজন, কারণ 降っている = 降って + いる',
                translation: 'বৃষ্টি পড়ছে, তাই বের হচ্ছি না।',
                detail: '「降っている」 = পড়ছে।'
            }
        };

        // HTML 生成
        function renderQuestions() {
            const grid = document.getElementById('quizGrid');
            grid.innerHTML = '';
            questions.forEach(q => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${q.num}`;
                
                let optionsHtml = '';
                const optLetters = ['a', 'b', 'c', 'd'];
                q.options.forEach((opt, idx) => {
                    optionsHtml += `<div class="option-btn" onclick="checkAnswer(this, ${q.num}, '${optLetters[idx]}')">${optLetters[idx].toUpperCase()}) ${opt}</div>`;
                });

                // বাক্যটি দেখান, ফাঁকা জায়গা হাইলাইট করা
                const sentenceWithBlank = q.sentence.replace('（　）', '<span class="blank">（　）</span>');

                card.innerHTML = `
                    <div class="q-num">Q${q.num}</div>
                    <div class="sentence">${sentenceWithBlank}</div>
                    <div class="options" id="opt-group-${q.num}">
                        ${optionsHtml}
                    </div>
                    <div class="feedback" id="fb-${q.num}"></div>
                `;
                grid.appendChild(card);
            });
        }

        // 答えをチェック
        function checkAnswer(element, qNum, selectedOpt) {
            const groupId = 'opt-group-' + qNum;
            const options = document.querySelectorAll(`#${groupId} .option-btn`);
            const feedbackDiv = document.getElementById('fb-' + qNum);

            if (options[0].classList.contains('disabled-opt')) return;

            const q = questions.find(q => q.num === qNum);
            const correctAns = q.correct;
            const isCorrect = (selectedOpt === correctAns);

            options.forEach(opt => opt.classList.add('disabled-opt'));

            options.forEach(opt => {
                if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                    opt.classList.add('correct-opt');
                }
            });

            if (!isCorrect) {
                element.classList.add('wrong-opt');
            }

            const exp = explanations[qNum];
            if (isCorrect) {
                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">⭕ せいかい！</span> 
                        <div class="rule"><strong>📌 ルール:</strong> ${exp.rule}</div>
                        <div class="translation"><strong>📖 翻訳:</strong> ${exp.translation}</div>
                        <div><strong>💡 詳細:</strong> ${exp.detail}</div>
                    </div>
                `;
            } else {
                feedbackDiv.innerHTML = `
                    <div class="feedback wrong-fb">
                        <span class="fb-title">❌ まちがい。</span> 正しい答えは緑色です。<br>
                        <div class="rule"><strong>📌 ルール:</strong> ${exp.rule}</div>
                        <div class="translation"><strong>📖 翻訳:</strong> ${exp.translation}</div>
                        <div><strong>💡 詳細:</strong> ${exp.detail}</div>
                    </div>
                `;
            }
        }

        // 全ての答えを表示
        function revealAllAnswers() {
            for (let qNum = 141; qNum <= 160; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);
                const q = questions.find(q => q.num === qNum);
                const correctAns = q.correct;
                const exp = explanations[qNum];

                options.forEach(opt => {
                    opt.classList.add('disabled-opt');
                    if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                        opt.classList.add('correct-opt');
                    }
                });

                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">✅ 答え：</span> 
                        <div class="rule"><strong>📌 ルール:</strong> ${exp.rule}</div>
                        <div class="translation"><strong>📖 翻訳:</strong> ${exp.translation}</div>
                        <div><strong>💡 詳細:</strong> ${exp.detail}</div>
                    </div>
                `;
            }
        }

        // リセット
        function resetAll() {
            for (let qNum = 141; qNum <= 160; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);

                options.forEach(opt => {
                    opt.classList.remove('disabled-opt', 'correct-opt', 'wrong-opt');
                });

                feedbackDiv.innerHTML = '';
            }
        }

        window.onload = renderQuestions;
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
</body>
</html>
