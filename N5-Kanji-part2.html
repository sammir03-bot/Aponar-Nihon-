<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N5 漢字クイズ - パート2 (問題16-30) ふりがな付き</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hind Siliguri', 'Noto Sans Bengali', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            background: linear-gradient(145deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #0c4a6e;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 40px 40px 20px 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-bottom: 6px solid #0284c7;
            text-align: center;
        }

        h1 {
            font-size: 2.4em;
            font-weight: 700;
            color: #0369a1;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 span {
            background: #0284c7;
            color: white;
            font-size: 0.45em;
            padding: 6px 20px;
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .subhead {
            font-size: 1.2em;
            color: #0369a1;
            background: #f0f9ff;
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-block;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed #7dd3fc;
            font-weight: 600;
            color: #0369a1;
        }

        .badge {
            background: #0369a1;
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 1em;
        }

        .quiz-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-card {
            background: white;
            border-radius: 30px;
            padding: 25px 30px;
            box-shadow: 0 10px 25px rgba(2, 132, 199, 0.1);
            transition: transform 0.2s;
            border: 2px solid #bae6fd;
        }

        .question-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px rgba(2, 132, 199, 0.2);
            border-color: #38bdf8;
        }

        .q-num {
            display: inline-block;
            background: #0284c7;
            color: white;
            font-weight: 600;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 1rem;
            margin-bottom: 18px;
            letter-spacing: 0.5px;
        }

        .sentence {
            font-size: 1.8em;
            margin-bottom: 20px;
            line-height: 2.2;
            background: #f0f9ff;
            padding: 20px 25px;
            border-radius: 25px;
            border: 2px solid #bae6fd;
            font-weight: 600;
            color: #075985;
            text-align: center;
            word-break: break-word;
        }

        .highlight-kanji {
            display: inline-block;
            background: #fee2e2;
            color: #b91c1c;
            font-weight: 700;
            padding: 4px 15px;
            border-radius: 40px;
            border: 2px solid #fecaca;
            margin: 0 5px;
            font-size: 1.2em;
        }

        .question-text {
            font-size: 1.3em;
            margin-bottom: 15px;
            font-weight: 500;
            color: #075985;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 20px 0 15px;
        }

        .option-btn {
            background: white;
            border: 3px solid #bae6fd;
            padding: 18px 12px;
            border-radius: 60px;
            font-size: 1.3em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            color: #075985;
            box-shadow: 0 5px 10px rgba(0,0,0,0.02);
        }

        .option-btn:hover:not(.disabled-opt) {
            background: #e0f2fe;
            border-color: #0284c7;
            transform: scale(1.01);
            box-shadow: 0 10px 15px rgba(2,132,199,0.15);
        }

        .correct-opt {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            box-shadow: 0 5px 15px rgba(34,197,94,0.25);
        }

        .wrong-opt {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #7f1d1d !important;
            opacity: 0.9;
        }

        .disabled-opt {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        .feedback {
            margin-top: 20px;
            padding: 18px 22px;
            border-radius: 25px;
            background: #f8fafc;
            border-left: 8px solid #64748b;
            font-size: 1.1em;
            line-height: 1.7;
            border: 1px solid #cbd5e1;
        }

        .feedback.correct-fb {
            background: #f0fdf4;
            border-left-color: #22c55e;
        }

        .feedback.wrong-fb {
            background: #fef2f2;
            border-left-color: #ef4444;
        }

        .fb-title {
            font-weight: 700;
            margin-right: 10px;
            font-size: 1.1em;
        }

        .rule {
            background: #fffbeb;
            padding: 10px 15px;
            border-radius: 20px;
            margin-top: 10px;
            border-left: 5px solid #f59e0b;
            font-size: 0.95em;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 40px 0 30px;
            justify-content: center;
        }

        .primary-btn, .secondary-btn {
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 2px solid transparent;
        }

        .primary-btn {
            background: #0284c7;
            color: white;
        }

        .primary-btn:hover {
            background: #0369a1;
            transform: translateY(-4px);
            box-shadow: 0 20px 30px rgba(2,132,199,0.35);
        }

        .secondary-btn {
            background: #1e293b;
            color: white;
        }

        .secondary-btn:hover {
            background: #0f172a;
            transform: translateY(-4px);
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            color: #0369a1;
            font-size: 1rem;
            background: white;
            padding: 20px;
            border-radius: 70px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 2px solid #bae6fd;
        }

        hr {
            border: none;
            height: 3px;
            background: linear-gradient(to right, transparent, #0284c7, transparent);
            margin: 30px 0;
        }

        @media (max-width: 700px) {
            h1 { font-size: 2em; }
            .sentence { font-size: 1.5em; }
            .options { grid-template-columns: 1fr; }
            .option-btn { padding: 15px; }
        }

        /* furigana styling */
        ruby {
            ruby-align: center;
        }
        rt {
            font-size: 0.6em;
            color: #0284c7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                📘 JLPT N5 漢字クイズ
                <span>Part 2 (16-30)</span>
            </h1>
            <div class="subhead">
                かんじの よみかた・かきかたを えらんでください。（ふりがな付き）
            </div>
            <div class="stats">
                <span>🈳 全15問</span>
                <span class="badge">レベル N5 · 漢字</span>
            </div>
        </div>

        <div class="quiz-grid" id="quizGrid">
            <!-- JavaScriptで生成 -->
        </div>

        <div class="action-buttons">
            <button class="primary-btn" onclick="revealAllAnswers()">✅ 全ての答えを見る</button>
            <button class="secondary-btn" onclick="resetAll()">🔄 リセット</button>
        </div>

        <hr>
        <div class="footer">
            ⚡ 日本語能力試験 N5 対策 | 解説はベンガル語（とても簡単な説明）
        </div>
    </div>

    <script>
        // 質問データ (問題16-30) with furigana - JLPT N5 official style
        const questions = [
            // Type 1: Kanji reading questions (もんだい１ style)
            { 
                num: 16, 
                type: 'reading',
                sentence: 'あの <span class="highlight-kanji">【古】</span>い たてものは <ruby>図書館<rt>としょかん</rt></ruby>です。',
                question: '【古】の 読(よ)み方(かた)は どれですか。',
                options: ['あたら', 'ふる', 'やす', 'たか'], 
                correct: 'b' 
            },
            { 
                num: 17, 
                type: 'reading',
                sentence: 'この <span class="highlight-kanji">【新】</span>しい くるまは <ruby>父<rt>ちち</rt></ruby>のです。',
                question: '【新】の 読み方は？',
                options: ['ふる', 'あたら', 'やす', 'たか'], 
                correct: 'b' 
            },
            { 
                num: 18, 
                type: 'reading',
                sentence: 'この <span class="highlight-kanji">【安】</span>い レストランで ひるごはんを たべましょう。',
                question: '【安】の 読み方は？',
                options: ['やす', 'たか', 'ひく', 'よわ'], 
                correct: 'a' 
            },
            { 
                num: 19, 
                type: 'reading',
                sentence: 'あの <span class="highlight-kanji">【高】</span>い ビルは <ruby>銀行<rt>ぎんこう</rt></ruby>です。',
                question: '【高】の 読み方は？',
                options: ['ひく', 'たか', 'おお', 'ちい'], 
                correct: 'b' 
            },
            { 
                num: 20, 
                type: 'reading',
                sentence: '<span class="highlight-kanji">【父】</span>は まいにち しんぶんを よみます。',
                question: '【父】の 読み方は？',
                options: ['はは', 'あに', 'あね', 'ちち'], 
                correct: 'd' 
            },
            { 
                num: 21, 
                type: 'reading',
                sentence: '<span class="highlight-kanji">【母】</span>は りょうりが じょうずです。',
                question: '【母】の 読み方は？',
                options: ['ちち', 'はは', 'あね', 'あに'], 
                correct: 'b' 
            },
            { 
                num: 22, 
                type: 'reading',
                sentence: 'この <span class="highlight-kanji">【町】</span>には こうえんが たくさん あります。',
                question: '【町】の 読み方は？',
                options: ['まち', 'むら', 'みち', 'とし'], 
                correct: 'a' 
            },
            { 
                num: 23, 
                type: 'reading',
                sentence: 'あそこに <span class="highlight-kanji">【電車】</span>が きました。',
                question: '【電車】の 読み方は？',
                options: ['でんしゃ', 'じてんしゃ', 'でんき', 'くるま'], 
                correct: 'a' 
            },
            { 
                num: 24, 
                type: 'reading',
                sentence: '<ruby>毎日<rt>まいにち</rt></ruby> <span class="highlight-kanji">【日本語】</span>を べんきょうします。',
                question: '【日本語】の 読み方は？',
                options: ['にほんご', 'にほん', 'にっぽんご', 'にほんごう'], 
                correct: 'a' 
            },
            { 
                num: 25, 
                type: 'reading',
                sentence: 'あの <span class="highlight-kanji">【人】</span>は だれですか。',
                question: '【人】の 読み方は？',
                options: ['じん', 'ひと', 'にん', 'かた'], 
                correct: 'b' 
            },
            // Type 2: Choose correct kanji (もんだい２ style)
            { 
                num: 26, 
                type: 'kanji',
                sentence: 'きょうは 「てんき」 が いい です。',
                question: '「てんき」 の かんじ は どれ？',
                options: ['天気', '元気', '電気', '気分'], 
                correct: 'a' 
            },
            { 
                num: 27, 
                type: 'kanji',
                sentence: 'わたしの 「しゅみ」 は おんがくです。',
                question: '「しゅみ」 の かんじ は？',
                options: ['趣味', '興味', '好み', '楽み'], 
                correct: 'a' 
            },
            { 
                num: 28, 
                type: 'kanji',
                sentence: 'この みちは 「あぶない」 です。',
                question: '「あぶない」 の かんじ は？',
                options: ['安全', '危ない', '危険', '安心'], 
                correct: 'b' 
            },
            { 
                num: 29, 
                type: 'kanji',
                sentence: 'いぬと 「ねこ」 が すきです。',
                question: '「ねこ」 の かんじ は？',
                options: ['犬', '猫', '鳥', '魚'], 
                correct: 'b' 
            },
            { 
                num: 30, 
                type: 'kanji',
                sentence: 'あの レストランは 「ゆうめい」 です。',
                question: '「ゆうめい」 の かんじ は？',
                options: ['有名', '有名人', '名高い', '大名'], 
                correct: 'a' 
            }
        ];

        // 簡単な解説 (ベンガル語) - খুব সহজ ভাষায়
        const explanations = {
            16: '【古】 = ふるい (পুরনো)। 新しい = あたらしい (নতুন)।',
            17: '【新】 = あたらしい (নতুন)। 古い = ふるい (পুরনো)।',
            18: '【安】 = やすい (সস্তা)। 高い = たかい (দামি/উঁচু)।',
            19: '【高】 = たかい (উঁচু/দামি)। 低い = ひくい (নিচু)।',
            20: '【父】 = ちち (আমার বাবা)। 母 = はは (মা)।',
            21: '【母】 = はは (আমার মা)। 父 = ちち (বাবা)।',
            22: '【町】 = まち (শহর/টাউন)। 村 = むら (গ্রাম)।',
            23: '【電車】 = でんしゃ (ট্রেন)। 自転車 = じてんしゃ (বাইসাইকেল)।',
            24: '【日本語】 = にほんご (জাপানি ভাষা)।',
            25: '【人】 = ひと (মানুষ)। 一人 = ひとり, 二人 = ふたり।',
            26: '【天気】 = てんき (আবহাওয়া)। 元気 = げんき (স্বাস্থ্যবান)।',
            27: '【趣味】 = しゅみ (শখ)। JLPT N5 শব্দ।',
            28: '【危ない】 = あぶない (বিপজ্জনক)। 安全 = あんぜん (নিরাপদ)।',
            29: '【猫】 = ねこ (বিড়াল)। 犬 = いぬ (কুকুর)।',
            30: '【有名】 = ゆうめい (বিখ্যাত)। N5-এ খুব কমন।'
        };

        // HTML 生成
        function renderQuestions() {
            const grid = document.getElementById('quizGrid');
            grid.innerHTML = '';
            
            questions.forEach(q => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${q.num}`;
                
                let optionsHtml = '';
                const optLetters = ['a', 'b', 'c', 'd'];
                q.options.forEach((opt, idx) => {
                    optionsHtml += `<div class="option-btn" onclick="checkAnswer(this, ${q.num}, '${optLetters[idx]}')">${optLetters[idx].toUpperCase()}) ${opt}</div>`;
                });

                card.innerHTML = `
                    <div class="q-num">Q${q.num}</div>
                    <div class="sentence">${q.sentence}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options" id="opt-group-${q.num}">
                        ${optionsHtml}
                    </div>
                    <div class="feedback" id="fb-${q.num}"></div>
                `;
                grid.appendChild(card);
            });
        }

        // 答えをチェック
        function checkAnswer(element, qNum, selectedOpt) {
            const groupId = 'opt-group-' + qNum;
            const options = document.querySelectorAll(`#${groupId} .option-btn`);
            const feedbackDiv = document.getElementById('fb-' + qNum);

            if (options[0].classList.contains('disabled-opt')) return;

            const q = questions.find(q => q.num === qNum);
            const correctAns = q.correct;
            const isCorrect = (selectedOpt === correctAns);

            options.forEach(opt => opt.classList.add('disabled-opt'));

            options.forEach(opt => {
                if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                    opt.classList.add('correct-opt');
                }
            });

            if (!isCorrect) {
                element.classList.add('wrong-opt');
            }

            const exp = explanations[qNum];
            if (isCorrect) {
                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">⭕ せいかい！</span> 
                        <div class="rule">${exp}</div>
                    </div>
                `;
            } else {
                feedbackDiv.innerHTML = `
                    <div class="feedback wrong-fb">
                        <span class="fb-title">❌ まちがい。</span> 正しい答えは緑色です。<br>
                        <div class="rule">${exp}</div>
                    </div>
                `;
            }
        }

        // 全ての答えを表示
        function revealAllAnswers() {
            for (let qNum = 16; qNum <= 30; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);
                const q = questions.find(q => q.num === qNum);
                const correctAns = q.correct;
                const exp = explanations[qNum];

                options.forEach(opt => {
                    opt.classList.add('disabled-opt');
                    if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                        opt.classList.add('correct-opt');
                    }
                });

                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">✅ 答え：</span> 
                        <div class="rule">${exp}</div>
                    </div>
                `;
            }
        }

        // リセット
        function resetAll() {
            for (let qNum = 16; qNum <= 30; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);

                options.forEach(opt => {
                    opt.classList.remove('disabled-opt', 'correct-opt', 'wrong-opt');
                });

                feedbackDiv.innerHTML = '';
            }
        }

        window.onload = renderQuestions;
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
</body>
</html>
