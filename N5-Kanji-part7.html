<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N5 漢字クイズ - パート7 (問題91-105) ふりがな付き</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hind Siliguri', 'Noto Sans Bengali', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            background: linear-gradient(145deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #0c4a6e;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 40px 40px 20px 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-bottom: 6px solid #0284c7;
            text-align: center;
        }

        h1 {
            font-size: 2.4em;
            font-weight: 700;
            color: #0369a1;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 span {
            background: #0284c7;
            color: white;
            font-size: 0.45em;
            padding: 6px 20px;
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .subhead {
            font-size: 1.2em;
            color: #0369a1;
            background: #f0f9ff;
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-block;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed #7dd3fc;
            font-weight: 600;
            color: #0369a1;
        }

        .badge {
            background: #0369a1;
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 1em;
        }

        .quiz-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-card {
            background: white;
            border-radius: 30px;
            padding: 25px 30px;
            box-shadow: 0 10px 25px rgba(2, 132, 199, 0.1);
            transition: transform 0.2s;
            border: 2px solid #bae6fd;
        }

        .question-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px rgba(2, 132, 199, 0.2);
            border-color: #38bdf8;
        }

        .q-num {
            display: inline-block;
            background: #0284c7;
            color: white;
            font-weight: 600;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 1rem;
            margin-bottom: 18px;
            letter-spacing: 0.5px;
        }

        .sentence {
            font-size: 1.8em;
            margin-bottom: 20px;
            line-height: 2.2;
            background: #f0f9ff;
            padding: 20px 25px;
            border-radius: 25px;
            border: 2px solid #bae6fd;
            font-weight: 600;
            color: #075985;
            text-align: center;
            word-break: break-word;
        }

        .highlight-kanji {
            display: inline-block;
            background: #fee2e2;
            color: #b91c1c;
            font-weight: 700;
            padding: 4px 15px;
            border-radius: 40px;
            border: 2px solid #fecaca;
            margin: 0 5px;
            font-size: 1.2em;
        }

        .question-text {
            font-size: 1.3em;
            margin-bottom: 15px;
            font-weight: 500;
            color: #075985;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 20px 0 15px;
        }

        .option-btn {
            background: white;
            border: 3px solid #bae6fd;
            padding: 18px 12px;
            border-radius: 60px;
            font-size: 1.3em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            color: #075985;
            box-shadow: 0 5px 10px rgba(0,0,0,0.02);
        }

        .option-btn:hover:not(.disabled-opt) {
            background: #e0f2fe;
            border-color: #0284c7;
            transform: scale(1.01);
            box-shadow: 0 10px 15px rgba(2,132,199,0.15);
        }

        .correct-opt {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            box-shadow: 0 5px 15px rgba(34,197,94,0.25);
        }

        .wrong-opt {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #7f1d1d !important;
            opacity: 0.9;
        }

        .disabled-opt {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        .feedback {
            margin-top: 20px;
            padding: 18px 22px;
            border-radius: 25px;
            background: #f8fafc;
            border-left: 8px solid #64748b;
            font-size: 1.1em;
            line-height: 1.7;
            border: 1px solid #cbd5e1;
        }

        .feedback.correct-fb {
            background: #f0fdf4;
            border-left-color: #22c55e;
        }

        .feedback.wrong-fb {
            background: #fef2f2;
            border-left-color: #ef4444;
        }

        .fb-title {
            font-weight: 700;
            margin-right: 10px;
            font-size: 1.1em;
        }

        .rule {
            background: #fffbeb;
            padding: 10px 15px;
            border-radius: 20px;
            margin-top: 10px;
            border-left: 5px solid #f59e0b;
            font-size: 0.95em;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 40px 0 30px;
            justify-content: center;
        }

        .primary-btn, .secondary-btn {
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 2px solid transparent;
        }

        .primary-btn {
            background: #0284c7;
            color: white;
        }

        .primary-btn:hover {
            background: #0369a1;
            transform: translateY(-4px);
            box-shadow: 0 20px 30px rgba(2,132,199,0.35);
        }

        .secondary-btn {
            background: #1e293b;
            color: white;
        }

        .secondary-btn:hover {
            background: #0f172a;
            transform: translateY(-4px);
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            color: #0369a1;
            font-size: 1rem;
            background: white;
            padding: 20px;
            border-radius: 70px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 2px solid #bae6fd;
        }

        hr {
            border: none;
            height: 3px;
            background: linear-gradient(to right, transparent, #0284c7, transparent);
            margin: 30px 0;
        }

        @media (max-width: 700px) {
            h1 { font-size: 2em; }
            .sentence { font-size: 1.5em; }
            .options { grid-template-columns: 1fr; }
            .option-btn { padding: 15px; }
        }

        /* furigana styling */
        ruby {
            ruby-align: center;
        }
        rt {
            font-size: 0.6em;
            color: #0284c7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                📘 JLPT N5 漢字クイズ
                <span>Part 7 (91-105)</span>
            </h1>
            <div class="subhead">
                かんじの よみかた・かきかたを えらんでください。（ふりがな付き）
            </div>
            <div class="stats">
                <span>🈳 全15問</span>
                <span class="badge">レベル N5 · 漢字</span>
            </div>
        </div>

        <div class="quiz-grid" id="quizGrid">
            <!-- JavaScriptで生成 -->
        </div>

        <div class="action-buttons">
            <button class="primary-btn" onclick="revealAllAnswers()">✅ 全ての答えを見る</button>
            <button class="secondary-btn" onclick="resetAll()">🔄 リセット</button>
        </div>

        <hr>
        <div class="footer">
            ⚡ 日本語能力試験 N5 対策 | 解説はベンガル語（とても簡単な説明）
        </div>
    </div>

    <script>
        // 質問データ (問題91-105) with furigana - JLPT N5 official style
        const questions = [
            // Type 1: Kanji reading questions (もんだい１ style) - 91から100まで
            { 
                num: 91, 
                type: 'reading',
                sentence: 'ここ に <span class="highlight-kanji">【住所】</span>を <ruby>書<rt>か</rt></ruby>いて ください।',
                question: '【住所】の 読(よ)み方(かた)は どれですか।',
                options: ['じゅうしょ', 'じゅしょ', 'じゅうところ', 'すまい'], 
                correct: 'a' 
            },
            { 
                num: 92, 
                type: 'reading',
                sentence: 'わたし の <span class="highlight-kanji">【趣味】</span>は えいが を <ruby>見<rt>み</rt></ruby>る こと です।',
                question: '【趣味】の 読み方は？',
                options: ['しゅみ', 'しゅみい', 'しみゅ', 'しゅび'], 
                correct: 'a' 
            },
            { 
                num: 93, 
                type: 'reading',
                sentence: '<ruby>先生<rt>せんせい</rt></ruby>は <span class="highlight-kanji">【教科書】</span>を ひらきました।',
                question: '【教科書】の 読み方は？',
                options: ['きょうかしょ', 'きょうかしょく', 'きょうかしょん', 'きょうきょしょ'], 
                correct: 'a' 
            },
            { 
                num: 94, 
                type: 'reading',
                sentence: 'これは むずかしい <span class="highlight-kanji">【問題】</span>です।',
                question: '【問題】の 読み方は？',
                options: ['もんだい', 'もんたい', 'ぶんだい', 'ぶんたい'], 
                correct: 'a' 
            },
            { 
                num: 95, 
                type: 'reading',
                sentence: '<span class="highlight-kanji">【試験】</span>は <ruby>来週<rt>らいしゅう</rt></ruby> あります।',
                question: '【試験】の 読み方は？',
                options: ['しけん', 'しけい', 'じけん', 'しゅけん'], 
                correct: 'a' 
            },
            { 
                num: 96, 
                type: 'reading',
                sentence: 'あした の <span class="highlight-kanji">【予定】</span>を おしえて ください।',
                question: '【予定】の 読み方は？',
                options: ['よてい', 'よぜい', 'こてい', 'こうてい'], 
                correct: 'a' 
            },
            { 
                num: 97, 
                type: 'reading',
                sentence: 'きょう は <span class="highlight-kanji">【午前】</span>だけ <ruby>仕事<rt>しごと</rt></ruby>を します।',
                question: '【午前】の 読み方は？',
                options: ['ごご', 'ごぜん', 'ごまえ', 'ごあさ'], 
                correct: 'b' 
            },
            { 
                num: 98, 
                type: 'reading',
                sentence: 'こんばん <span class="highlight-kanji">【夕飯】</span>を つくります।',
                question: '【夕飯】の 読み方は？',
                options: ['ゆうばん', 'ゆうはん', 'ゆうめし', 'よるめし'], 
                correct: 'b' 
            },
            { 
                num: 99, 
                type: 'reading',
                sentence: 'この <span class="highlight-kanji">【料理】</span>は とても かんたん です।',
                question: '【料理】の 読み方は？',
                options: ['りょうに', 'りょうり', 'りょり', 'りょうれ'], 
                correct: 'b' 
            },
            { 
                num: 100, 
                type: 'reading',
                sentence: '<span class="highlight-kanji">【銀行】</span>で お<ruby>金<rt>かね</rt></ruby>を おろしました।',
                question: '【銀行】の 読み方は？',
                options: ['ぎんこう', 'ぎんこ', 'きんこう', 'きんこ'], 
                correct: 'a' 
            },
            { 
                num: 101, 
                type: 'reading',
                sentence: 'この <span class="highlight-kanji">【薬】</span>を <ruby>一日<rt>いちにち</rt></ruby> ２<ruby>回<rt>かい</rt></ruby> <ruby>飲<rt>の</rt></ruby>んで ください।',
                question: '【薬】の 読み方は？',
                options: ['くすり', 'くしき', 'くしり', 'くさり'], 
                correct: 'a' 
            },
            { 
                num: 102, 
                type: 'reading',
                sentence: '<span class="highlight-kanji">【駅前】</span>で <ruby>友達<rt>ともだち</rt></ruby>と <ruby>会<rt>あ</rt></ruby>いました।',
                question: '【駅前】の 読み方は？',
                options: ['えきまえ', 'えきうしろ', 'えきまい', 'えきもん'], 
                correct: 'a' 
            },
            { 
                num: 103, 
                type: 'reading',
                sentence: 'いま <span class="highlight-kanji">【工事】</span>を して いる ので、 この <ruby>道<rt>みち</rt></ruby>は <ruby>通<rt>とお</rt></ruby>れません।',
                question: '【工事】の 読み方は？',
                options: ['こうじ', 'こうし', 'こうごと', 'こうこと'], 
                correct: 'a' 
            },
            { 
                num: 104, 
                type: 'reading',
                sentence: '<ruby>兄<rt>あに</rt></ruby>は <span class="highlight-kanji">【会社員】</span>です।',
                question: '【会社員】の 読み方は？',
                options: ['かいしゃいん', 'かいしやいん', 'かいじんいん', 'かいしゃひと'], 
                correct: 'a' 
            },
            { 
                num: 105, 
                type: 'reading',
                sentence: '<ruby>次<rt>つぎ</rt></ruby>の <span class="highlight-kanji">【角】</span>を <ruby>左<rt>ひだり</rt></ruby>に まがります।',
                question: '【角】の 読み方は？',
                options: ['かど', 'つの', 'まど', 'かく'], 
                correct: 'a' 
            }
        ];

        // 簡単な解説 (ベンガル語) - খুব সহজ ভাষায়
        const explanations = {
            91: '【住所】 = じゅうしょ (ঠিকানা)। N5/N4 শব্দ।',
            92: '【趣味】 = しゅみ (শখ)। JLPT N5 কুইজে প্রায়ই আসে।',
            93: '【教科書】 = きょうかしょ (টেক্সটবুক)। 教＝শেখানো, 科＝বিষয়, 書＝বই।',
            94: '【問題】 = もんだい (প্রশ্ন/সমস্যা)। অফিসিয়াল পেপারে থাকে।',
            95: '【試験】 = しけん (পরীক্ষা)। N5 শেষের দিকে কমন।',
            96: '【予定】 = よてい (প্ল্যান/সূচি)।',
            97: '【午前】 = ごぜん (সকাল)। 午後 = ごご (বিকাল)।',
            98: '【夕飯】 = ゆうはん (রাতের খাবার)। 夕食 (ゆうしょく) ও দেখা যায়।',
            99: '【料理】 = りょうり (রান্না)। আগের সেটেও ছিল।',
            100: '【銀行】 = ぎんこう (ব্যাংক)।',
            101: '【薬】 = くすり (ওষুধ)। N5 কোর ভোকাব।',
            102: '【駅前】 = えきまえ (স্টেশনের সামনে)।',
            103: '【工事】 = こうじ (নির্মাণ কাজ/রোডওয়ার্ক)।',
            104: '【会社員】 = かいしゃいん (অফিস কর্মী)।',
            105: '【角】 = かど (মোড়/কোণা)। N5 মক কুইজে আছে।'
        };

        // HTML 生成
        function renderQuestions() {
            const grid = document.getElementById('quizGrid');
            grid.innerHTML = '';
            
            questions.forEach(q => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${q.num}`;
                
                let optionsHtml = '';
                const optLetters = ['a', 'b', 'c', 'd'];
                q.options.forEach((opt, idx) => {
                    optionsHtml += `<div class="option-btn" onclick="checkAnswer(this, ${q.num}, '${optLetters[idx]}')">${optLetters[idx].toUpperCase()}) ${opt}</div>`;
                });

                card.innerHTML = `
                    <div class="q-num">Q${q.num}</div>
                    <div class="sentence">${q.sentence}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options" id="opt-group-${q.num}">
                        ${optionsHtml}
                    </div>
                    <div class="feedback" id="fb-${q.num}"></div>
                `;
                grid.appendChild(card);
            });
        }

        // 答えをチェック
        function checkAnswer(element, qNum, selectedOpt) {
            const groupId = 'opt-group-' + qNum;
            const options = document.querySelectorAll(`#${groupId} .option-btn`);
            const feedbackDiv = document.getElementById('fb-' + qNum);

            if (options[0].classList.contains('disabled-opt')) return;

            const q = questions.find(q => q.num === qNum);
            const correctAns = q.correct;
            const isCorrect = (selectedOpt === correctAns);

            options.forEach(opt => opt.classList.add('disabled-opt'));

            options.forEach(opt => {
                if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                    opt.classList.add('correct-opt');
                }
            });

            if (!isCorrect) {
                element.classList.add('wrong-opt');
            }

            const exp = explanations[qNum];
            if (isCorrect) {
                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">⭕ せいかい！</span> 
                        <div class="rule">${exp}</div>
                    </div>
                `;
            } else {
                feedbackDiv.innerHTML = `
                    <div class="feedback wrong-fb">
                        <span class="fb-title">❌ まちがい。</span> 正しい答えは緑色です。<br>
                        <div class="rule">${exp}</div>
                    </div>
                `;
            }
        }

        // 全ての答えを表示
        function revealAllAnswers() {
            for (let qNum = 91; qNum <= 105; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);
                const q = questions.find(q => q.num === qNum);
                const correctAns = q.correct;
                const exp = explanations[qNum];

                options.forEach(opt => {
                    opt.classList.add('disabled-opt');
                    if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                        opt.classList.add('correct-opt');
                    }
                });

                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">✅ 答え：</span> 
                        <div class="rule">${exp}</div>
                    </div>
                `;
            }
        }

        // リセット
        function resetAll() {
            for (let qNum = 91; qNum <= 105; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);

                options.forEach(opt => {
                    opt.classList.remove('disabled-opt', 'correct-opt', 'wrong-opt');
                });

                feedbackDiv.innerHTML = '';
            }
        }

        window.onload = renderQuestions;
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
</body>
</html>
