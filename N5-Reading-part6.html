                    { num: 101, text: 'メールは だれから <ruby>来<rt>き</rt></ruby>ましたか।', options: ['<ruby>先生<rt>せんせい</rt></ruby>', '<ruby>日本人<rt>にほんじん</rt></ruby>の <ruby>友達<rt>ともだち</rt></ruby>', '<ruby>家族<rt>かぞく</rt></ruby>', 'アルバイトの <ruby>人<rt>ひと</rt></ruby>'], correct: 'b' },
                    { num: 102, text: 'メールには <ruby>何<rt>なに</rt></ruby>が <ruby>書<rt>か</rt></ruby>いて ありましたか।', options: ['「べんきょう しましょう」', '「りょこう しませんか」', '「いっしょに えいがを 見ませんか」', '「テストを します」'], correct: 'c' },
                    { num: 103, text: 'えいがは いつ <ruby>見<rt>み</rt></ruby>る つもり ですか।', options: ['<ruby>今日<rt>きょう</rt></ruby>', 'あした', '<ruby>今度<rt>こんど</rt></ruby>の <ruby>日曜日<rt>にちようび</rt></ruby>', '<ruby>来週<rt>らいしゅう</rt></ruby>の <ruby>土曜日<rt>どようび</rt></ruby>'], correct: 'c' },
                    { num: 104, text: 'わたしは どう <ruby>返事<rt>へんじ</rt></ruby>を しましたか।', options: ['<ruby>行<rt>い</rt></ruby>きません と <ruby>言<rt>い</rt></ruby>いました।', 'まだ わかりません と <ruby>書<rt>か</rt></ruby>きました।', '行きたいです と <ruby>答<rt>こた</rt></ruby>えました।', '<ruby>何<rt>なに</rt></ruby>も 返事を しません でした।'], correct: 'c' }

                    { num: 106, text: '<ruby>学校<rt>がっこう</rt></ruby>へ <ruby>行<rt>い</rt></ruby>く とき、 <ruby>何<rt>なに</rt></ruby>を つかいましたか।', options: ['くつ', 'ぼうし', 'かさ', 'てぶくろ'], correct: 'c' },

                    { num: 108, text: 'きょう、あそびに <ruby>行<rt>い</rt></ruby>きました か।', options: ['はい、<ruby>友達<rt>ともだち</rt></ruby>の いえへ 行きました।', 'はい、こうえんへ 行きました।', 'いいえ、どこへも 行きません でした।', 'はい、えいがかんへ 行きました।'], correct: 'c' }

                    { num: 112, text: 'アルバイトの <ruby>場所<rt>ばしょ</rt></ruby>は どこですか।', options: ['<ruby>学校<rt>がっこう</rt></ruby>の <ruby>中<rt>なか</rt></ruby>', '<ruby>駅<rt>えき</rt></ruby>の <ruby>前<rt>まえ</rt></ruby>の コンビニ', '<ruby>銀行<rt>ぎんこう</rt></ruby>の <ruby>中<rt>なか</rt></ruby>', 'スーパーの <ruby>上<rt>うえ</rt></ruby>'], correct: 'b' }

            },
            {
                id: 29,
                title: 'パッセージ ２９：日本語クラスのおしらせ',
                text: '<ruby>日本語<rt>にほんご</rt></ruby>クラス の お<ruby>知<rt>し</rt></ruby>らせ<br>・レベル：　Ｎ５<br>・<ruby>曜日<rt>ようび</rt></ruby>：　<ruby>火曜日<rt>かようび</rt></ruby> と <ruby>木曜日<rt>もくようび</rt></ruby><br>・<ruby>時間<rt>じかん</rt></ruby>：　<ruby>夜<rt>よる</rt></ruby>７<ruby>時<rt>じ</rt></ruby>〜８<ruby>時半<rt>じはん</rt></ruby><br>・<ruby>定員<rt>ていいん</rt></ruby>：　１クラス １５<ruby>人<rt>にん</rt></ruby>まで',
                questions: [

                    { num: 114, text: 'クラスが ある <ruby>曜日<rt>ようび</rt></ruby>は いつですか।', options: ['<ruby>月曜日<rt>げつようび</rt></ruby>と <ruby>水曜日<rt>すいようび</rt></ruby>', '<ruby>火曜日<rt>かようび</rt></ruby>と <ruby>木曜日<rt>もくようび</rt></ruby>', '<ruby>土曜日<rt>どようび</rt></ruby>と <ruby>日曜日<rt>にちようび</rt></ruby>', '<ruby>毎日<rt>まいにち</rt></ruby>'], correct: 'b' },

        // HTML 生成
        function renderPassages() {
            const grid = document.getElementById('quizGrid');
            grid.innerHTML = '';
            
            passages.forEach(passage => {
                const passageDiv = document.createElement('div');
                passageDiv.className = 'passage-card';
                
                let passageHtml = `
                    <div class="passage-title">📌 ${passage.title}</div>
                    <div class="passage-text">${passage.text}</div>
                `;
                
                passage.questions.forEach(q => {
                    let optionsHtml = '';
                    const optLetters = ['a', 'b', 'c', 'd'];
                    q.options.forEach((opt, idx) => {
                        optionsHtml += `<div class="option-btn" onclick="checkAnswer(this, ${q.num}, '${optLetters[idx]}')">${optLetters[idx].toUpperCase()}) ${opt}</div>`;
                    });
                    
                    passageHtml += `
                        <div class="question-card" id="q${q.num}">
                            <div class="q-num">Q${q.num}</div>
                            <div class="question-text">${q.text}</div>
                            <div class="options" id="opt-group-${q.num}">
                                ${optionsHtml}
                            </div>
                            <div class="feedback" id="fb-${q.num}"></div>
                        </div>
                    `;
                });
                
                passageDiv.innerHTML = passageHtml;
                grid.appendChild(passageDiv);
            });
        }

        // 答えをチェック
        function checkAnswer(element, qNum, selectedOpt) {
            const groupId = 'opt-group-' + qNum;
            const options = document.querySelectorAll(`#${groupId} .option-btn`);
            const feedbackDiv = document.getElementById('fb-' + qNum);

            if (options[0].classList.contains('disabled-opt')) return;

            // 正解を探す
            let correctAns = '';
            passages.forEach(p => {
                p.questions.forEach(q => {
                    if (q.num === qNum) correctAns = q.correct;
                });
            });
            
            const isCorrect = (selectedOpt === correctAns);
            options.forEach(opt => opt.classList.add('disabled-opt'));

            options.forEach(opt => {
                if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                    opt.classList.add('correct-opt');
                }
            });

            if (!isCorrect) {
                element.classList.add('wrong-opt');
            }

            const exp = explanations[qNum];
            if (isCorrect) {
                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">⭕ せいかい！</span> 
                        <div>${exp}</div>
                    </div>
                `;
            } else {
                feedbackDiv.innerHTML = `
                    <div class="feedback wrong-fb">
                        <span class="fb-title">❌ まちがい。</span> 正しい答えは緑色です。<br>
                        <div>${exp}</div>
                    </div>
                `;
            }
        }

        // 全ての答えを表示
        function revealAllAnswers() {
            for (let qNum = 101; qNum <= 120; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);
                
                let correctAns = '';
                passages.forEach(p => {
                    p.questions.forEach(q => {
                        if (q.num === qNum) correctAns = q.correct;
                    });
                });
                
                const exp = explanations[qNum];

                options.forEach(opt => {
                    opt.classList.add('disabled-opt');
                    if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                        opt.classList.add('correct-opt');
                    }
                });

                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">✅ 答え：</span> 
                        <div>${exp}</div>
                    </div>
                `;
            }
        }

        // リセット
        function resetAll() {
            for (let qNum = 101; qNum <= 120; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);

                options.forEach(opt => {
                    opt.classList.remove('disabled-opt', 'correct-opt', 'wrong-opt');
                });

                feedbackDiv.innerHTML = '';
            }
        }

        window.onload = renderPassages;
    </script>
