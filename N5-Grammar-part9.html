<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>JLPT N5 文法クイズ - パート9 (問題161-180) ふりがな付き</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hind Siliguri', 'Noto Sans Bengali', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            background: linear-gradient(145deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #0c4a6e;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 40px 40px 20px 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-bottom: 6px solid #0284c7;
            text-align: center;
        }

        h1 {
            font-size: 2.4em;
            font-weight: 700;
            color: #0369a1;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 span {
            background: #0284c7;
            color: white;
            font-size: 0.45em;
            padding: 6px 20px;
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .subhead {
            font-size: 1.2em;
            color: #0369a1;
            background: #f0f9ff;
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-block;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed #7dd3fc;
            font-weight: 600;
            color: #0369a1;
        }

        .badge {
            background: #0369a1;
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 1em;
        }

        .quiz-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-card {
            background: white;
            border-radius: 30px;
            padding: 25px 30px;
            box-shadow: 0 10px 25px rgba(2, 132, 199, 0.1);
            transition: transform 0.2s;
            border: 2px solid #bae6fd;
        }

        .question-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px rgba(2, 132, 199, 0.2);
            border-color: #38bdf8;
        }

        .q-num {
            display: inline-block;
            background: #0284c7;
            color: white;
            font-weight: 600;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 1rem;
            margin-bottom: 18px;
            letter-spacing: 0.5px;
        }

        .sentence {
            font-size: 1.8em;
            margin-bottom: 20px;
            line-height: 2.2;
            background: #f0f9ff;
            padding: 20px 25px;
            border-radius: 25px;
            border: 2px solid #bae6fd;
            font-weight: 600;
            color: #075985;
            text-align: center;
            word-break: break-word;
        }

        .blank {
            display: inline-block;
            background: #fee2e2;
            color: #b91c1c;
            font-weight: 700;
            padding: 4px 15px;
            border-radius: 40px;
            border: 2px dashed #ef4444;
            margin: 0 5px;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 20px 0 15px;
        }

        .option-btn {
            background: white;
            border: 3px solid #bae6fd;
            padding: 18px 12px;
            border-radius: 60px;
            font-size: 1.3em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            color: #075985;
            box-shadow: 0 5px 10px rgba(0,0,0,0.02);
        }

        .option-btn:hover:not(.disabled-opt) {
            background: #e0f2fe;
            border-color: #0284c7;
            transform: scale(1.01);
            box-shadow: 0 10px 15px rgba(2,132,199,0.15);
        }

        .correct-opt {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            box-shadow: 0 5px 15px rgba(34,197,94,0.25);
        }

        .wrong-opt {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #7f1d1d !important;
            opacity: 0.9;
        }

        .disabled-opt {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        .feedback {
            margin-top: 20px;
            padding: 18px 22px;
            border-radius: 25px;
            background: #f8fafc;
            border-left: 8px solid #64748b;
            font-size: 1.1em;
            line-height: 1.7;
            border: 1px solid #cbd5e1;
        }

        .feedback.correct-fb {
            background: #f0fdf4;
            border-left-color: #22c55e;
        }

        .feedback.wrong-fb {
            background: #fef2f2;
            border-left-color: #ef4444;
        }

        .fb-title {
            font-weight: 700;
            margin-right: 10px;
            font-size: 1.1em;
        }

        .rule {
            background: #fffbeb;
            padding: 10px 15px;
            border-radius: 20px;
            margin-top: 10px;
            border-left: 5px solid #f59e0b;
            font-size: 0.95em;
        }

        .translation {
            background: #e0f2fe;
            padding: 8px 15px;
            border-radius: 20px;
            margin-top: 8px;
            font-style: italic;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 40px 0 30px;
            justify-content: center;
        }

        .primary-btn, .secondary-btn {
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 2px solid transparent;
        }

        .primary-btn {
            background: #0284c7;
            color: white;
        }

        .primary-btn:hover {
            background: #0369a1;
            transform: translateY(-4px);
            box-shadow: 0 20px 30px rgba(2,132,199,0.35);
        }

        .secondary-btn {
            background: #1e293b;
            color: white;
        }

        .secondary-btn:hover {
            background: #0f172a;
            transform: translateY(-4px);
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            color: #0369a1;
            font-size: 1rem;
            background: white;
            padding: 20px;
            border-radius: 70px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 2px solid #bae6fd;
        }

        hr {
            border: none;
            height: 3px;
            background: linear-gradient(to right, transparent, #0284c7, transparent);
            margin: 30px 0;
        }

        @media (max-width: 700px) {
            h1 { font-size: 2em; }
            .sentence { font-size: 1.5em; }
            .options { grid-template-columns: 1fr; }
            .option-btn { padding: 15px; }
        }

        /* furigana styling */
        ruby {
            ruby-align: center;
        }
        rt {
            font-size: 0.6em;
            color: #0284c7;
        }
    </style>
</head>

    <script>

        const questions = [

            { num: 163, sentence: '<ruby>来週<rt>らいしゅう</rt></ruby>、<ruby>友達<rt>ともだち</rt></ruby>がうちに<ruby>遊<rt>あそ</rt></ruby>び（　）<ruby>来<rt>き</rt></ruby>ます।', options: ['に', 'を', 'で', 'が'], correct: 'a' },
            { num: 164, sentence: 'きのうの<ruby>夜<rt>よる</rt></ruby>はなかなか<ruby>寝<rt>ね</rt></ruby>られ（　）でした।', options: ['ない', 'ません', 'ません', 'ませんでした'], correct: 'd' },
            { num: 165, sentence: 'はしでご<ruby>飯<rt>はん</rt></ruby>を<ruby>食<rt>た</rt></ruby>べる（　）になりました।', options: ['とき', 'の', 'こと', 'よう'], correct: 'd' },
            { num: 166, sentence: '<ruby>日本語<rt>にほんご</rt></ruby>の<ruby>勉強<rt>べんきょう</rt></ruby>をやめ（　）たいと<ruby>思<rt>おも</rt></ruby>いません।', options: ['て', 'る', 'たい', 'た'], correct: 'b' },
            { num: 167, sentence: 'これは<ruby>日本<rt>にほん</rt></ruby>で<ruby>一番<rt>いちばん</rt></ruby><ruby>有名<rt>ゆうめい</rt></ruby>（　）お<ruby>寺<rt>てら</rt></ruby>です।', options: ['な', 'の', 'に', 'で'], correct: 'a' },
            { num: 168, sentence: 'このへやは<ruby>広<rt>ひろ</rt></ruby>く（　）<ruby>静<rt>しず</rt></ruby>かです।', options: ['て', 'くて', 'で', 'に'], correct: 'b' },
            { num: 169, sentence: '<ruby>先生<rt>せんせい</rt></ruby>の<ruby>話<rt>はなし</rt></ruby>はむずかし（　）けど、おもしろいです।', options: ['い', 'く', 'くて', 'かった'], correct: 'a' },
            { num: 170, sentence: 'あした<ruby>雨<rt>あめ</rt></ruby>が<ruby>降<rt>ふ</rt></ruby>る（　）と<ruby>思<rt>おも</rt></ruby>います।', options: ['の', 'こと', 'と', 'か'], correct: 'c' },
            { num: 171, sentence: 'この<ruby>本<rt>ほん</rt></ruby>は<ruby>日本語<rt>にほんご</rt></ruby>の<ruby>勉強<rt>べんきょう</rt></ruby>（　）とても<ruby>役<rt>やく</rt></ruby>に<ruby>立<rt>た</rt></ruby>ちます।', options: ['に', 'で', 'を', 'が'], correct: 'a' },
            { num: 172, sentence: 'ボールペン（　）えんぴつ、どちらを<ruby>使<rt>つか</rt></ruby>いますか।', options: ['か', 'と', 'や', 'の'], correct: 'a' },
            { num: 173, sentence: 'ここから<ruby>駅<rt>えき</rt></ruby>まで<ruby>歩<rt>ある</rt></ruby>い（　）１０<ruby>分<rt>ぷん</rt></ruby>ぐらいです।', options: ['て', 'で', 'に', 'を'], correct: 'b' },
            { num: 174, sentence: 'びょうき（　）とき、このくすりを<ruby>飲<rt>の</rt></ruby>んでください।', options: ['が', 'の', 'な', 'の'], correct: 'b' },
            { num: 175, sentence: '<ruby>先生<rt>せんせい</rt></ruby>に<ruby>日本語<rt>にほんご</rt></ruby>で<ruby>質問<rt>しつもん</rt></ruby>し（　）みました।', options: ['て', 'た', 'て', 'て'], correct: 'a' },
            { num: 176, sentence: 'あの<ruby>人<rt>ひと</rt></ruby>は<ruby>英語<rt>えいご</rt></ruby>だけ（　）、<ruby>中国語<rt>ちゅうごくご</rt></ruby>も<ruby>話<rt>はな</rt></ruby>せます।', options: ['で', 'じゃなくて', 'ではなくて', 'だけで'], correct: 'c' },
            { num: 177, sentence: 'この<ruby>店<rt>みせ</rt></ruby>の<ruby>料理<rt>りょうり</rt></ruby>は<ruby>安<rt>やす</rt></ruby>いの（　）、おいしいです।', options: ['で', 'に', 'にも', 'に'], correct: 'c' },
            { num: 178, sentence: 'ここにすわっ（　）もいいですか।', options: ['て', 'た', 'る', 'ない'], correct: 'a' },

        // 詳細な解説 (ベンガル語) - সরল ভাষায়
        const explanations = {

                rule: '「たい」 + 思わない = ইচ্ছা নেই। (やめたい = やめる + たい)',
                translation: 'জাপানি পড়া ছাড়তে চাই না।',

        // HTML 生成
        function renderQuestions() {
            const grid = document.getElementById('quizGrid');
            grid.innerHTML = '';
            questions.forEach(q => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${q.num}`;
                
                let optionsHtml = '';
                const optLetters = ['a', 'b', 'c', 'd'];
                q.options.forEach((opt, idx) => {
                    optionsHtml += `<div class="option-btn" onclick="checkAnswer(this, ${q.num}, '${optLetters[idx]}')">${optLetters[idx].toUpperCase()}) ${opt}</div>`;
                });

                // বাক্যটি দেখান, ফাঁকা জায়গা হাইলাইট করা
                const sentenceWithBlank = q.sentence.replace('（　）', '<span class="blank">（　）</span>');

                card.innerHTML = `
                    <div class="q-num">Q${q.num}</div>
                    <div class="sentence">${sentenceWithBlank}</div>
                    <div class="options" id="opt-group-${q.num}">
                        ${optionsHtml}
                    </div>
                    <div class="feedback" id="fb-${q.num}"></div>
                `;
                grid.appendChild(card);
            });
        }

        // 答えをチェック
        function checkAnswer(element, qNum, selectedOpt) {
            const groupId = 'opt-group-' + qNum;
            const options = document.querySelectorAll(`#${groupId} .option-btn`);
            const feedbackDiv = document.getElementById('fb-' + qNum);

            if (options[0].classList.contains('disabled-opt')) return;

            const q = questions.find(q => q.num === qNum);
            const correctAns = q.correct;
            const isCorrect = (selectedOpt === correctAns);

            options.forEach(opt => opt.classList.add('disabled-opt'));

            options.forEach(opt => {
                if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                    opt.classList.add('correct-opt');
                }
            });

            if (!isCorrect) {
                element.classList.add('wrong-opt');
            }

            const exp = explanations[qNum];
            if (isCorrect) {
                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">⭕ せいかい！</span> 
                        <div class="rule"><strong>📌 ルール:</strong> ${exp.rule}</div>
                        <div class="translation"><strong>📖 翻訳:</strong> ${exp.translation}</div>
                        <div><strong>💡 詳細:</strong> ${exp.detail}</div>
                    </div>
                `;
            } else {
                feedbackDiv.innerHTML = `
                    <div class="feedback wrong-fb">
                        <span class="fb-title">❌ まちがい。</span> 正しい答えは緑色です。<br>
                        <div class="rule"><strong>📌 ルール:</strong> ${exp.rule}</div>
                        <div class="translation"><strong>📖 翻訳:</strong> ${exp.translation}</div>
                        <div><strong>💡 詳細:</strong> ${exp.detail}</div>
                    </div>
                `;
            }
        }

        // 全ての答えを表示
        function revealAllAnswers() {
            for (let qNum = 161; qNum <= 180; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);
                const q = questions.find(q => q.num === qNum);
                const correctAns = q.correct;
                const exp = explanations[qNum];

                options.forEach(opt => {
                    opt.classList.add('disabled-opt');
                    if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                        opt.classList.add('correct-opt');
                    }
                });

                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">✅ 答え：</span> 
                        <div class="rule"><strong>📌 ルール:</strong> ${exp.rule}</div>
                        <div class="translation"><strong>📖 翻訳:</strong> ${exp.translation}</div>
                        <div><strong>💡 詳細:</strong> ${exp.detail}</div>
                    </div>
                `;
            }
        }

        // リセット
        function resetAll() {
            for (let qNum = 161; qNum <= 180; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);

                options.forEach(opt => {
                    opt.classList.remove('disabled-opt', 'correct-opt', 'wrong-opt');
                });

                feedbackDiv.innerHTML = '';
            }
        }

        window.onload = renderQuestions;
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
</body>
</html>
