<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N5 漢字クイズ - パート4 (問題46-60) ふりがな付き</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hind Siliguri', 'Noto Sans Bengali', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            background: linear-gradient(145deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #0c4a6e;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 40px 40px 20px 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-bottom: 6px solid #0284c7;
            text-align: center;
        }

        h1 {
            font-size: 2.4em;
            font-weight: 700;
            color: #0369a1;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 span {
            background: #0284c7;
            color: white;
            font-size: 0.45em;
            padding: 6px 20px;
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .subhead {
            font-size: 1.2em;
            color: #0369a1;
            background: #f0f9ff;
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-block;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed #7dd3fc;
            font-weight: 600;
            color: #0369a1;
        }

        .badge {
            background: #0369a1;
            color: white;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 1em;
        }

        .quiz-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-card {
            background: white;
            border-radius: 30px;
            padding: 25px 30px;
            box-shadow: 0 10px 25px rgba(2, 132, 199, 0.1);
            transition: transform 0.2s;
            border: 2px solid #bae6fd;
        }

        .question-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px rgba(2, 132, 199, 0.2);
            border-color: #38bdf8;
        }

        .q-num {
            display: inline-block;
            background: #0284c7;
            color: white;
            font-weight: 600;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 1rem;
            margin-bottom: 18px;
            letter-spacing: 0.5px;
        }

        .sentence {
            font-size: 1.8em;
            margin-bottom: 20px;
            line-height: 2.2;
            background: #f0f9ff;
            padding: 20px 25px;
            border-radius: 25px;
            border: 2px solid #bae6fd;
            font-weight: 600;
            color: #075985;
            text-align: center;
            word-break: break-word;
        }

        .highlight-kanji {
            display: inline-block;
            background: #fee2e2;
            color: #b91c1c;
            font-weight: 700;
            padding: 4px 15px;
            border-radius: 40px;
            border: 2px solid #fecaca;
            margin: 0 5px;
            font-size: 1.2em;
        }

        .question-text {
            font-size: 1.3em;
            margin-bottom: 15px;
            font-weight: 500;
            color: #075985;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 20px 0 15px;
        }

        .option-btn {
            background: white;
            border: 3px solid #bae6fd;
            padding: 18px 12px;
            border-radius: 60px;
            font-size: 1.3em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            color: #075985;
            box-shadow: 0 5px 10px rgba(0,0,0,0.02);
        }

        .option-btn:hover:not(.disabled-opt) {
            background: #e0f2fe;
            border-color: #0284c7;
            transform: scale(1.01);
            box-shadow: 0 10px 15px rgba(2,132,199,0.15);
        }

        .correct-opt {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            box-shadow: 0 5px 15px rgba(34,197,94,0.25);
        }

        .wrong-opt {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #7f1d1d !important;
            opacity: 0.9;
        }

        .disabled-opt {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        .feedback {
            margin-top: 20px;
            padding: 18px 22px;
            border-radius: 25px;
            background: #f8fafc;
            border-left: 8px solid #64748b;
            font-size: 1.1em;
            line-height: 1.7;
            border: 1px solid #cbd5e1;
        }

        .feedback.correct-fb {
            background: #f0fdf4;
            border-left-color: #22c55e;
        }

        .feedback.wrong-fb {
            background: #fef2f2;
            border-left-color: #ef4444;
        }

        .fb-title {
            font-weight: 700;
            margin-right: 10px;
            font-size: 1.1em;
        }

        .rule {
            background: #fffbeb;
            padding: 10px 15px;
            border-radius: 20px;
            margin-top: 10px;
            border-left: 5px solid #f59e0b;
            font-size: 0.95em;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 40px 0 30px;
            justify-content: center;
        }

        .primary-btn, .secondary-btn {
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 2px solid transparent;
        }

        .primary-btn {
            background: #0284c7;
            color: white;
        }

        .primary-btn:hover {
            background: #0369a1;
            transform: translateY(-4px);
            box-shadow: 0 20px 30px rgba(2,132,199,0.35);
        }

        .secondary-btn {
            background: #1e293b;
            color: white;
        }

        .secondary-btn:hover {
            background: #0f172a;
            transform: translateY(-4px);
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            color: #0369a1;
            font-size: 1rem;
            background: white;
            padding: 20px;
            border-radius: 70px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 2px solid #bae6fd;
        }

        hr {
            border: none;
            height: 3px;
            background: linear-gradient(to right, transparent, #0284c7, transparent);
            margin: 30px 0;
        }

        @media (max-width: 700px) {
            h1 { font-size: 2em; }
            .sentence { font-size: 1.5em; }
            .options { grid-template-columns: 1fr; }
            .option-btn { padding: 15px; }
        }

        /* furigana styling */
        ruby {
            ruby-align: center;
        }
        rt {
            font-size: 0.6em;
            color: #0284c7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                📘 JLPT N5 漢字クイズ
                <span>Part 4 (46-60)</span>
            </h1>
            <div class="subhead">
                かんじの よみかた・かきかたを えらんでください。（ふりがな付き）
            </div>
            <div class="stats">
                <span>🈳 全15問</span>
                <span class="badge">レベル N5 · 漢字</span>
            </div>
        </div>

        <div class="quiz-grid" id="quizGrid">
            <!-- JavaScriptで生成 -->
        </div>

        <div class="action-buttons">
            <button class="primary-btn" onclick="revealAllAnswers()">✅ 全ての答えを見る</button>
            <button class="secondary-btn" onclick="resetAll()">🔄 リセット</button>
        </div>

        <hr>
        <div class="footer">
            ⚡ 日本語能力試験 N5 対策 | 解説はベンガル語（とても簡単な説明）
        </div>
    </div>

    <script>
        // 質問データ (問題46-60) with furigana - JLPT N5 official style
        const questions = [
            // Type 2: Choose correct kanji (もんだい２ style) - 続き
            { 
                num: 46, 
                type: 'kanji',
                sentence: 'わたし の 「しゅみ」 は どくしょ です。',
                question: '「しゅみ」 の かんじ は どれ？',
                options: ['主味', '趣味', '首味', '手味'], 
                correct: 'b' 
            },
            { 
                num: 47, 
                type: 'kanji',
                sentence: 'あの 「おとこの ひと」 は せ が たかい です。',
                question: '「おとこの ひと」 の かんじ は？',
                options: ['男子', '男の子', '男の人', '田の人'], 
                correct: 'c' 
            },
            { 
                num: 48, 
                type: 'kanji',
                sentence: '「おんなの こ」 が ３<ruby>人<rt>にん</rt></ruby> います。',
                question: '「おんなの こ」 の かんじ は？',
                options: ['女の子', '女子', '女の人', '田の子'], 
                correct: 'a' 
            },
            { 
                num: 49, 
                type: 'kanji',
                sentence: 'らい<ruby>年<rt>ねん</rt></ruby> 「がいこく」 へ <ruby>行<rt>い</rt></ruby>きたい です。',
                question: '「がいこく」 の かんじ は？',
                options: ['国内', '外国', '外人', '国外'], 
                correct: 'b' 
            },
            { 
                num: 50, 
                type: 'kanji',
                sentence: 'まいあさ 「しんぶん」 を よみます。',
                question: '「しんぶん」 の 正しい かんじ は？',
                options: ['新聞', '新聞紙', '新聞本', '新文'], 
                correct: 'a' 
            },
            { 
                num: 51, 
                type: 'kanji',
                sentence: 'きょう は 「かぜ」 が つよい です。',
                question: '「かぜ」 の かんじ は？（air, wind）',
                options: ['風', '雪', '雲', '気'], 
                correct: 'a' 
            },
            { 
                num: 52, 
                type: 'kanji',
                sentence: '「あした」 は <ruby>休<rt>やす</rt></ruby>み です。',
                question: '「あした」 の かんじ は どれ？',
                options: ['夕日', '明日', '今日', '毎日'], 
                correct: 'b' 
            },
            { 
                num: 53, 
                type: 'kanji',
                sentence: '「きょねん」 <ruby>日本<rt>にほん</rt></ruby>へ <ruby>行<rt>い</rt></ruby>きました。',
                question: '「きょねん」 の かんじ は？',
                options: ['去年', '今年', '来年', '毎年'], 
                correct: 'a' 
            },
            { 
                num: 54, 
                type: 'kanji',
                sentence: 'つぎ の 「かど」 を <ruby>右<rt>みぎ</rt></ruby>に まがって ください。',
                question: '「かど」 の かんじ は？',
                options: ['曲', '角', '角口', '出口'], 
                correct: 'b' 
            },
            { 
                num: 55, 
                type: 'kanji',
                sentence: '「ときどき」 <ruby>映画館<rt>えいがかん</rt></ruby>へ <ruby>行<rt>い</rt></ruby>きます。',
                question: '「ときどき」 の かんじ は？',
                options: ['時々', '時時', '時々', '時間々'], 
                correct: 'c' 
            },
            { 
                num: 56, 
                type: 'kanji',
                sentence: 'この バス は 「ゆうがた」 から こんで きます。',
                question: '「ゆうがた」 に <ruby>近<rt>ちか</rt></ruby>い かんじ は？',
                options: ['夕方', '夕日', '夕食', '夜中'], 
                correct: 'a' 
            },
            { 
                num: 57, 
                type: 'kanji',
                sentence: '「ともだち」と いっしょに りょこう しました。',
                question: '「ともだち」 の かんじ は？',
                options: ['友人', '友達', '友男', '有友'], 
                correct: 'b' 
            },
            { 
                num: 58, 
                type: 'kanji',
                sentence: 'まいにち 「でんわ」 で かぞく と はなします。',
                question: '「でんわ」 の かんじ は？',
                options: ['電車', '電話', '電気', '電語'], 
                correct: 'b' 
            },
            { 
                num: 59, 
                type: 'kanji',
                sentence: 'かばん の <ruby>中<rt>なか</rt></ruby> に 「さいふ」 が ありません。',
                question: '「さいふ」 の 正しい かんじ は？',
                options: ['金布', '財布', '財布', '貝布'], 
                correct: 'c' 
            },
            { 
                num: 60, 
                type: 'kanji',
                sentence: 'この <span class="highlight-kanji">【道具】</span>を つかって ください。',
                question: '【道具】の 読(よ)み方(かた)は どれですか。',
                options: ['とうぐ', 'どうぐ', 'みちぐ', 'みちぐう'], 
                correct: 'b' 
            }
        ];

        // 簡単な解説 (ベンガル語) - খুব সহজ ভাষায়
        const explanations = {
            46: '【趣味】 = しゅみ (শখ/হবি)। JLPT N5-এ খুব কমন শব্দ।',
            47: '【男の人】 = おとこのひと (পুরুষ মানুষ)। 男子 (だんし) মানে "বালক", কিন্তু এখানে সঠিক উত্তর 男の人।',
            48: '【女の子】 = おんなのこ (মেয়েশিশু)। 女の人 = প্রাপ্তবয়স্ক মহিলা।',
            49: '【外国】 = がいこく (বিদেশ)। 国内 (こくない) = দেশের ভেতর।',
            50: '【新聞】 = しんぶん (খবরের কাগজ)। N5-এর বেসিক শব্দ।',
            51: '【風】 = かぜ (বাতাস/হাওয়া)। 天気 (てんき) = আবহাওয়া।',
            52: '【明日】 = あした (আগামীকাল)। 今日 (きょう) = আজ, 毎日 (まいにち) = প্রতিদিন।',
            53: '【去年】 = きょねん (গত বছর)। 今年 (ことし) = এই বছর, 来年 (らいねん) = আগামী বছর।',
            54: '【角】 = かど (কোণা/মোড়)। 曲 (きょく) = গান/সুর, ভিন্ন অর্থ।',
            55: '【時々】 = ときどき (মাঝে মাঝে)। সঠিক লিখিত রূপ "時々" (একই কাঞ্জি পুনরাবৃত্তি)।',
            56: '【夕方】 = ゆうがた (সন্ধ্যা)। 夕日 (ゆうひ) = সূর্যাস্ত, 夕食 (ゆうしょく) = রাতের খাবার।',
            57: '【友達】 = ともだち (বন্ধু)। 友人 (ゆうじん) একটু ফর্মাল শব্দ।',
            58: '【電話】 = でんわ (টেলিফোন)। 電 + 話 (ইলেকট্রিক কথা)।',
            59: '【財布】 = さいふ (মানিব্যাগ)। এই কাঞ্জি N5/N4-এ দেখা যায়।',
            60: '【道具】 = どうぐ (টুল/সরঞ্জাম)। 道 (みち) + 具 (ぐ) = どうぐ।'
        };

        // HTML 生成
        function renderQuestions() {
            const grid = document.getElementById('quizGrid');
            grid.innerHTML = '';
            
            questions.forEach(q => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q${q.num}`;
                
                let optionsHtml = '';
                const optLetters = ['a', 'b', 'c', 'd'];
                q.options.forEach((opt, idx) => {
                    optionsHtml += `<div class="option-btn" onclick="checkAnswer(this, ${q.num}, '${optLetters[idx]}')">${optLetters[idx].toUpperCase()}) ${opt}</div>`;
                });

                card.innerHTML = `
                    <div class="q-num">Q${q.num}</div>
                    <div class="sentence">${q.sentence}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options" id="opt-group-${q.num}">
                        ${optionsHtml}
                    </div>
                    <div class="feedback" id="fb-${q.num}"></div>
                `;
                grid.appendChild(card);
            });
        }

        // 答えをチェック
        function checkAnswer(element, qNum, selectedOpt) {
            const groupId = 'opt-group-' + qNum;
            const options = document.querySelectorAll(`#${groupId} .option-btn`);
            const feedbackDiv = document.getElementById('fb-' + qNum);

            if (options[0].classList.contains('disabled-opt')) return;

            const q = questions.find(q => q.num === qNum);
            const correctAns = q.correct;
            const isCorrect = (selectedOpt === correctAns);

            options.forEach(opt => opt.classList.add('disabled-opt'));

            options.forEach(opt => {
                if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                    opt.classList.add('correct-opt');
                }
            });

            if (!isCorrect) {
                element.classList.add('wrong-opt');
            }

            const exp = explanations[qNum];
            if (isCorrect) {
                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">⭕ せいかい！</span> 
                        <div class="rule">${exp}</div>
                    </div>
                `;
            } else {
                feedbackDiv.innerHTML = `
                    <div class="feedback wrong-fb">
                        <span class="fb-title">❌ まちがい。</span> 正しい答えは緑色です。<br>
                        <div class="rule">${exp}</div>
                    </div>
                `;
            }
        }

        // 全ての答えを表示
        function revealAllAnswers() {
            for (let qNum = 46; qNum <= 60; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);
                const q = questions.find(q => q.num === qNum);
                const correctAns = q.correct;
                const exp = explanations[qNum];

                options.forEach(opt => {
                    opt.classList.add('disabled-opt');
                    if (opt.getAttribute('onclick').includes(`'${correctAns}'`)) {
                        opt.classList.add('correct-opt');
                    }
                });

                feedbackDiv.innerHTML = `
                    <div class="feedback correct-fb">
                        <span class="fb-title">✅ 答え：</span> 
                        <div class="rule">${exp}</div>
                    </div>
                `;
            }
        }

        // リセット
        function resetAll() {
            for (let qNum = 46; qNum <= 60; qNum++) {
                const groupId = 'opt-group-' + qNum;
                const options = document.querySelectorAll(`#${groupId} .option-btn`);
                const feedbackDiv = document.getElementById('fb-' + qNum);

                options.forEach(opt => {
                    opt.classList.remove('disabled-opt', 'correct-opt', 'wrong-opt');
                });

                feedbackDiv.innerHTML = '';
            }
        }

        window.onload = renderQuestions;
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
</body>
</html>
